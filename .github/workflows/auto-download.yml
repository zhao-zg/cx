name: Auto Download Resources

on:
  schedule:
    # 每天北京时间早上 9 点运行 (UTC 1:00)
    - cron: '0 1 * * *'
  workflow_dispatch: # 允许手动触发

concurrency:
  group: auto-download-resources
  cancel-in-progress: false

permissions:
  contents: write  # 允许推送代码

jobs:
  download-resources:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Download resources
        run: |
          python down_resource.py
        continue-on-error: false

      - name: Check for changes
        id: check_changes
        run: |
          git add resource/
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "ℹ️ 没有新资源需要下载"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "✅ 发现新资源"
            git diff --staged --stat
          fi

      - name: Bump app version
        id: bump_version
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git fetch --tags --force

          NEW_VERSION=$(python - << 'PY'
          import json

          with open('app_config.json', 'r', encoding='utf-8') as f:
              config = json.load(f)

          version = str(config.get('version', '1.0.0'))
          parts = version.split('.')
          while len(parts) < 3:
              parts.append('0')

          major, minor, patch = int(parts[0]), int(parts[1]), int(parts[2])
          patch += 1
          new_version = f"{major}.{minor}.{patch}"
          config['version'] = new_version

          with open('app_config.json', 'w', encoding='utf-8') as f:
              json.dump(config, f, ensure_ascii=False, indent=2)
              f.write('\n')

          print(new_version)
          PY
          )

          NEW_TAG="v${NEW_VERSION}"
          echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "new_tag=${NEW_TAG}" >> $GITHUB_OUTPUT
          echo "✅ 版本已递增: ${NEW_VERSION}"

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add resource/ app_config.json
          git commit -m "🤖 自动下载: 新增训练资源 + 版本${{ steps.bump_version.outputs.new_version }}"
          git push

          git tag "${{ steps.bump_version.outputs.new_tag }}"
          git push origin "${{ steps.bump_version.outputs.new_tag }}"

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.check_changes.outputs.has_changes }}" == "true" ]; then
            echo "✅ 成功下载并提交新资源"
            echo "🏷️ 已创建版本标签: ${{ steps.bump_version.outputs.new_tag }}"
            echo "🚀 部署将由 deploy.yml 自动触发执行"
            echo "📱 APK 将由标签触发自动打包"
          else
            echo "ℹ️ 没有新资源需要更新"
          fi
