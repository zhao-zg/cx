name: Auto Download Resources

on:
  schedule:
    # 每天北京时间早上 9 点运行 (UTC 1:00)
    - cron: '0 1 * * *'
  workflow_dispatch: # 允许手动触发

concurrency:
  group: auto-download-resources
  cancel-in-progress: false

permissions:
  contents: write  # 允许推送代码

jobs:
  download-resources:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Install Wine (for PDB conversion)
        run: |
          echo "📦 安装 Wine..."
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          sudo apt-get install -y -qq wine64 wine32 --no-install-recommends || \
            sudo apt-get install -y -qq wine --no-install-recommends || true
          wine --version 2>/dev/null && echo "✓ Wine 已安装" || echo "⚠️ Wine 安装失败，PDB 转换将使用纯 Python 模式"
        continue-on-error: true

      - name: Download resources
        run: |
          python down_resource.py
        continue-on-error: false

      - name: Download PDB files
        run: |
          echo "📥 下载 PDB 文件 (所有年份)..."
          python down_resource.py --pdb
        continue-on-error: true

      - name: Convert PDB to TXT
        run: |
          echo "🔄 转换 PDB → TXT..."
          # 优先使用 Wine + iSilo，失败则回退到纯 Python
          if command -v wine &>/dev/null; then
            python convert_pdb.py --wine-isilo || python convert_pdb.py
          else
            python convert_pdb.py
          fi
          # 转换完成后删除 PDB 暂存目录（TXT 已放入历史合辑）
          if [ -d "resource/pdb" ]; then
            rm -rf resource/pdb
            echo "✓ 已清理 resource/pdb 暂存目录"
          fi
        continue-on-error: true

      - name: Check for changes
        id: check_changes
        run: |
          git add resource/
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "ℹ️ 没有新资源需要下载"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "✅ 发现新资源"
            git diff --staged --stat
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add resource/
          git commit -m "🤖 自动下载: 新增训练资源"
          git push

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.check_changes.outputs.has_changes }}" == "true" ]; then
            echo "✅ 成功下载并提交新资源"
            echo "ℹ️ 新资源已提交，部署将由 deploy.yml 自动触发"
            echo "📱 APK 打包需手动运行 release.bat 打版本触发"
          else
            echo "ℹ️ 没有新资源需要更新"
          fi
