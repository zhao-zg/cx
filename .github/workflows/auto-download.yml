name: Auto Download Resources

on:
  schedule:
    # 每天北京时间早上 9 点运行 (UTC 1:00)
    - cron: '0 1 * * *'
  workflow_dispatch: # 允许手动触发

concurrency:
  group: auto-download-resources
  cancel-in-progress: false

permissions:
  contents: write  # 允许推送代码

jobs:
  download-resources:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Download resources (Word + PDB + images)
        run: |
          python down_resource.py
        continue-on-error: false

      - name: Convert PDB to TXT
        id: convert_pdb
        run: |
          echo "🔄 转换 PDB → TXT..."
          echo "isilo3_pending=" >> $GITHUB_OUTPUT
          if [ -d "resource/pdb" ]; then
            echo "resource/pdb 目录存在，开始转换..."
            echo "ℹ️ CI 环境仅转换 PalmDOC/iSilo2 格式 (iSilo3 需本地 Windows/Mac 转换)"
            python -u convert_pdb.py --overwrite
            echo ""
            echo "📋 转换结果 (历史合辑中的新 TXT):"
            git status --short resource/历史合辑/ 2>/dev/null || true
            # 检查未转换的 iSilo3 PDB 文件
            PENDING=$(find resource/pdb -name '*.pdb' -o -name '*.pdb.zip' 2>/dev/null | head -20)
            if [ -n "$PENDING" ]; then
              echo ""
              echo "⚠️ 以下 PDB 文件未转换 (iSilo3 格式，需本地转换):"
              echo "$PENDING" | while read f; do echo "  - $f"; done
              # 把待转换列表传给 Summary 步骤
              LIST=$(echo "$PENDING" | tr '\n' ',' | sed 's/,$//')
              echo "isilo3_pending=$LIST" >> $GITHUB_OUTPUT
            fi
          else
            echo "ℹ️ resource/pdb 目录不存在，跳过转换"
          fi
        continue-on-error: true

      - name: Check for changes
        id: check_changes
        run: |
          git add resource/
          # 排除 PDB 暂存文件（只提交转换后的 TXT 和正常下载的资源）
          git reset HEAD resource/pdb/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "ℹ️ 没有新资源需要下载"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "✅ 发现新资源"
            git diff --staged --stat
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add resource/
          git reset HEAD resource/pdb/ 2>/dev/null || true
          git commit -m "🤖 自动下载: 新增训练资源"
          git push

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.check_changes.outputs.has_changes }}" == "true" ]; then
            echo "✅ 成功下载并提交新资源"
            echo "ℹ️ 新资源已提交，部署将由 deploy.yml 自动触发"
            echo "📱 APK 打包需手动运行 release.bat 打版本触发"
          else
            echo "ℹ️ 没有新资源需要更新"
          fi
          PENDING="${{ steps.convert_pdb.outputs.isilo3_pending }}"
          if [ -n "$PENDING" ]; then
            echo ""
            echo "⚠️ 有待转换的 iSilo3 PDB 文件，请在本地运行:"
            echo "   python convert_pdb.py --isilo-exe \"C:\\Program Files\\iSilo\\iSilo.exe\""
            echo "$PENDING" | tr ',' '\n' | while read f; do [ -n "$f" ] && echo "   - $f"; done
          fi
