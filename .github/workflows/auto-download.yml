name: Auto Download Resources

on:
  schedule:
    # 每天北京时间早上 9 点运行 (UTC 1:00)
    - cron: '0 1 * * *'
  workflow_dispatch: # 允许手动触发

concurrency:
  group: auto-download-resources
  cancel-in-progress: false

permissions:
  contents: write  # 允许推送代码

jobs:
  download-resources:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Download resources
        run: |
          python down_resource.py
        continue-on-error: false

      - name: Download PDB files
        run: |
          echo "📥 下载 PDB 文件 (所有年份)..."
          python down_resource.py --pdb
          echo ""
          echo "📋 已下载的 PDB 文件:"
          find resource/pdb -name "*.pdb" -type f 2>/dev/null || echo "(无)"
        continue-on-error: true

      - name: Convert PDB to TXT
        run: |
          echo "🔄 转换 PDB → TXT..."
          if [ -d "resource/pdb" ]; then
            echo "resource/pdb 目录存在，开始转换..."
            python convert_pdb.py --overwrite
            echo ""
            echo "📋 转换结果 (历史合辑中的新 TXT):"
            git status --short resource/历史合辑/ 2>/dev/null || true
          else
            echo "ℹ️ resource/pdb 目录不存在，跳过转换"
          fi
        continue-on-error: true

      - name: Check for changes
        id: check_changes
        run: |
          git add resource/
          # 排除 PDB 暂存文件（只提交转换后的 TXT 和正常下载的资源）
          git reset HEAD resource/pdb/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "ℹ️ 没有新资源需要下载"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "✅ 发现新资源"
            git diff --staged --stat
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add resource/
          git reset HEAD resource/pdb/ 2>/dev/null || true
          git commit -m "🤖 自动下载: 新增训练资源"
          git push

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.check_changes.outputs.has_changes }}" == "true" ]; then
            echo "✅ 成功下载并提交新资源"
            echo "ℹ️ 新资源已提交，部署将由 deploy.yml 自动触发"
            echo "📱 APK 打包需手动运行 release.bat 打版本触发"
          else
            echo "ℹ️ 没有新资源需要更新"
          fi
