name: Auto Download Resources

on:
  schedule:
    # 每天北京时间早上 9 点运行 (UTC 1:00)
    - cron: '0 1 * * *'
  workflow_dispatch: # 允许手动触发

concurrency:
  group: auto-download-resources
  cancel-in-progress: false

permissions:
  contents: write  # 允许推送代码

jobs:
  download-resources:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Install Wine + iSilo
        run: |
          echo "📦 安装 Wine + p7zip..."
          sudo dpkg --add-architecture i386
          sudo mkdir -pm755 /etc/apt/keyrings
          sudo wget -O /etc/apt/keyrings/winehq-archive.key https://dl.winehq.org/wine-builds/winehq.key
          sudo wget -NP /etc/apt/sources.list.d/ https://dl.winehq.org/wine-builds/ubuntu/dists/$(lsb_release -cs)/winehq-$(lsb_release -cs).sources
          sudo apt-get update -qq
          sudo apt-get install -y -qq winehq-stable p7zip-full --no-install-recommends
          echo "✓ Wine 已安装: $(wine --version)"

          echo "📦 下载并解压 iSilo..."
          ISILO_DIR="$HOME/.wine/drive_c/Program Files/iSilo"
          mkdir -p "$ISILO_DIR"

          # 优先从 Secret URL 下载 (完整 exe)
          if [ -n "${{ secrets.ISILO_DOWNLOAD_URL }}" ]; then
            echo "从 ISILO_DOWNLOAD_URL Secret 下载..."
            wget -q "${{ secrets.ISILO_DOWNLOAD_URL }}" -O "$ISILO_DIR/iSilo.exe"
          fi

          # 从官方 MSI 用 7z 提取 (比 msiextract 更可靠)
          if [ ! -f "$ISILO_DIR/iSilo.exe" ]; then
            echo "从官方 MSI 提取..."
            wget -q "http://www.iSilo.com/download/dl/iSilo620W32Setup.msi" -O /tmp/iSilo.msi
            mkdir -p /tmp/isilo_msi
            cd /tmp/isilo_msi && 7z x -y /tmp/iSilo.msi >/dev/null 2>&1
            # MSI 内嵌的 cab 或 exe 可能在子层，递归查找
            EXTRACTED=$(find /tmp/isilo_msi -iname "iSilo.exe" -type f 2>/dev/null | head -1)
            if [ -n "$EXTRACTED" ]; then
              cp "$EXTRACTED" "$ISILO_DIR/iSilo.exe"
              echo "✓ iSilo.exe 已从 MSI 提取"
            else
              # 7z 可能提取为 _iSilo.exe 等变体名，也搜索一下
              EXTRACTED2=$(find /tmp/isilo_msi -iname "*isilo*exe*" -type f 2>/dev/null | head -1)
              if [ -n "$EXTRACTED2" ]; then
                cp "$EXTRACTED2" "$ISILO_DIR/iSilo.exe"
                echo "✓ iSilo.exe 已从 MSI 提取 (变体名: $(basename "$EXTRACTED2"))"
              fi
            fi
            # 列出提取目录内容便于调试
            echo "MSI 提取内容:"
            find /tmp/isilo_msi -type f | head -20
          fi

          # Wine 静默安装作为最后手段
          if [ ! -f "$ISILO_DIR/iSilo.exe" ] && [ -f /tmp/iSilo.msi ]; then
            echo "尝试 Wine 静默安装..."
            wineboot --init 2>/dev/null || true
            WINEDEBUG=-all wine msiexec /i "$(winepath -w /tmp/iSilo.msi)" /qn 2>/dev/null || true
            # 搜索 Wine 前缀下的 iSilo.exe
            EXTRACTED3=$(find "$HOME/.wine" -iname "iSilo.exe" -type f 2>/dev/null | head -1)
            if [ -n "$EXTRACTED3" ]; then
              cp "$EXTRACTED3" "$ISILO_DIR/iSilo.exe"
              echo "✓ iSilo.exe 已通过 Wine 安装提取"
            fi
          fi

          # 检查结果
          if [ -f "$ISILO_DIR/iSilo.exe" ]; then
            echo "✓ iSilo.exe 已就绪: $(ls -la "$ISILO_DIR/iSilo.exe")"
          else
            echo "⚠️ iSilo 安装失败，iSilo3 格式的 PDB 将无法转换"
            echo "   请在仓库 Settings → Secrets 中添加 ISILO_DOWNLOAD_URL (iSilo.exe 直链)"
          fi

      - name: Download resources (Word + PDB + images)
        run: |
          python down_resource.py
        continue-on-error: false

      - name: Convert PDB to TXT
        run: |
          export ISILO_EXE="$HOME/.wine/drive_c/Program Files/iSilo/iSilo.exe"
          echo "🔄 转换 PDB → TXT..."
          if [ -d "resource/pdb" ]; then
            echo "resource/pdb 目录存在，开始转换..."
            if [ -f "$ISILO_EXE" ]; then
              echo "✓ iSilo.exe 已就绪，使用 Wine + iSilo 转换"
              python convert_pdb.py --wine-isilo --overwrite
            else
              echo "⚠️ iSilo.exe 未就绪，仅转换 PalmDOC/iSilo2 格式"
              python convert_pdb.py --overwrite
            fi
            echo ""
            echo "📋 转换结果 (历史合辑中的新 TXT):"
            git status --short resource/历史合辑/ 2>/dev/null || true
          else
            echo "ℹ️ resource/pdb 目录不存在，跳过转换"
          fi
        continue-on-error: true

      - name: Check for changes
        id: check_changes
        run: |
          git add resource/
          # 排除 PDB 暂存文件（只提交转换后的 TXT 和正常下载的资源）
          git reset HEAD resource/pdb/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "ℹ️ 没有新资源需要下载"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "✅ 发现新资源"
            git diff --staged --stat
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add resource/
          git reset HEAD resource/pdb/ 2>/dev/null || true
          git commit -m "🤖 自动下载: 新增训练资源"
          git push

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.check_changes.outputs.has_changes }}" == "true" ]; then
            echo "✅ 成功下载并提交新资源"
            echo "ℹ️ 新资源已提交，部署将由 deploy.yml 自动触发"
            echo "📱 APK 打包需手动运行 release.bat 打版本触发"
          else
            echo "ℹ️ 没有新资源需要更新"
          fi
