name: Auto Download Resources

on:
  schedule:
    # 每天北京时间早上 9 点运行 (UTC 1:00)
    - cron: '0 1 * * *'
  workflow_dispatch: # 允许手动触发

concurrency:
  group: auto-download-resources
  cancel-in-progress: false

permissions:
  contents: write  # 允许推送代码
  actions: write   # 允许触发其他 workflow

jobs:
  download-resources:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Download resources
        run: |
          python down_resource.py
        continue-on-error: false

      - name: Check for changes
        id: check_changes
        run: |
          git add resource/
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "ℹ️ 没有新资源需要下载"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "✅ 发现新资源"
            git diff --staged --stat
          fi

      - name: Bump app version
        id: bump_version
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git fetch --tags --force

          NEW_VERSION=$(python - << 'PY'
          import json

          with open('app_config.json', 'r', encoding='utf-8') as f:
              config = json.load(f)

          version = str(config.get('version', '1.0.0'))
          parts = version.split('.')
          while len(parts) < 3:
              parts.append('0')

          major, minor, patch = int(parts[0]), int(parts[1]), int(parts[2])
          patch += 1
          new_version = f"{major}.{minor}.{patch}"
          config['version'] = new_version

          with open('app_config.json', 'w', encoding='utf-8') as f:
              json.dump(config, f, ensure_ascii=False, indent=2)
              f.write('\n')

          print(new_version)
          PY
          )

          NEW_TAG="v${NEW_VERSION}"
          echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "new_tag=${NEW_TAG}" >> $GITHUB_OUTPUT
          echo "✅ 版本已递增: ${NEW_VERSION}"

      - name: Update changelog
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          python3 << 'PY'
          import subprocess, json
          from datetime import date

          # 获取已暂存的变更文件，提取新增的资源目录名
          # 使用 core.quotepath=false 禁止 Git 对中文路径进行转义（否则含中文的目录名
          # 会被输出为 "resource/\xe5..." 格式，导致 startswith('resource/') 匹配失败）
          result = subprocess.run(
              ['git', '-c', 'core.quotepath=false', 'diff', '--staged', '--name-only'],
              capture_output=True, text=True, encoding='utf-8'
          )
          folders = set()
          for line in result.stdout.splitlines():
              if line.startswith('resource/'):
                  parts = line.split('/')
                  if len(parts) >= 2 and parts[1]:
                      folders.add(parts[1])

          if not folders:
              print('ℹ️ 未检测到资源目录变更，跳过 changelog 更新')
              exit(0)

          version = '${{ steps.bump_version.outputs.new_version }}'
          with open('changelog.json', 'r', encoding='utf-8') as f:
              changelog = json.load(f)

          # 区分"新增目录"与"更新已有目录内容"
          import os
          new_folders = []
          updated_folders = []
          for f in sorted(folders):
              folder_path = os.path.join('resource', f)
              # 通过 git log 判断该目录在本次提交前是否已存在
              prev = subprocess.run(
                  ['git', '-c', 'core.quotepath=false', 'diff', '--staged',
                   '--diff-filter=A', '--name-only', '--', f'resource/{f}/'],
                  capture_output=True, text=True, encoding='utf-8'
              )
              # 如果该目录下有新增文件（A = Added），视为新增；否则视为更新
              if prev.stdout.strip():
                  new_folders.append(f)
              else:
                  updated_folders.append(f)

          entry = {'date': str(date.today())}
          if new_folders:
              entry['new'] = [f'新增训练资源：{f}' for f in new_folders]
          if updated_folders:
              entry.setdefault('opt', [])
              entry['opt'] += [f'更新训练资源：{f}' for f in updated_folders]
          changelog[version] = entry

          with open('changelog.json', 'w', encoding='utf-8') as f:
              json.dump(changelog, f, ensure_ascii=False, indent=2)
              f.write('\n')

          print(f'✅ changelog.json 已更新版本 {version}，资源：{sorted(folders)}')
          PY

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add resource/ app_config.json changelog.json
          git commit -m "🤖 自动下载: 新增训练资源 + 版本${{ steps.bump_version.outputs.new_version }}"
          git push

          git tag "${{ steps.bump_version.outputs.new_tag }}"
          git push origin "${{ steps.bump_version.outputs.new_tag }}"

      - name: Trigger APK build workflow
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/dispatch_response.json -w "%{http_code}" -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/android-release-offline.yml/dispatches" \
            -d '{"ref":"${{ steps.bump_version.outputs.new_tag }}"}')
          if [ "$HTTP_STATUS" = "204" ]; then
            echo "🚀 已触发 APK 构建 (ref: ${{ steps.bump_version.outputs.new_tag }})"
          else
            echo "❌ 触发 APK 构建失败 (HTTP $HTTP_STATUS)"
            cat /tmp/dispatch_response.json
            exit 1
          fi

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.check_changes.outputs.has_changes }}" == "true" ]; then
            echo "✅ 成功下载并提交新资源"
            echo "🏷️ 已创建版本标签: ${{ steps.bump_version.outputs.new_tag }}"
            echo "🚀 部署将由 deploy.yml 自动触发执行"
            echo "📱 APK 将由标签触发自动打包"
          else
            echo "ℹ️ 没有新资源需要更新"
          fi
