    - name: 配置签名
      run: |
        echo "=== 配置 APK 签名 ==="
        
        cat > insert_signing.py << 'PYTHON_EOF'
        import re
        import sys
        
        gradle_file = sys.argv[1]
        keystore_file = sys.argv[2]
        
        with open(gradle_file, 'r') as f:
            content = f.read()
        
        signing_config = f'''
            signingConfigs {{
                release {{
                    storeFile file("../{keystore_file}")
                    storePassword "tehui2024"
                    keyAlias "tehui"
                    keyPassword "tehui2024"
                }}
            }}
        '''
        content = re.sub(r'(android\s*\{)', r'\1' + signing_config, content, count=1)
        content = re.sub(r'(buildTypes\s*\{[^}]*release\s*\{)', r'\1\n            signingConfig signingConfigs.release', content, count=1)
        
        with open(gradle_file, 'w') as f:
            f.write(content)
        
        print(f"✓ {gradle_file} 签名配置已插入")
        PYTHON_EOF
        
        python3 insert_signing.py android/app/build.gradle offline-key.keystore
        echo "✓ 签名配置完成"
        
    - name: 启用资源压缩和代码优化
      run: |
        echo "=== 启用资源压缩和代码优化 ==="
        
        cat > enable_shrink.py << 'PYTHON_EOF'
        import re
        
        gradle_file = 'android/app/build.gradle'
        
        with open(gradle_file, 'r') as f:
            content = f.read()
        
        # 在 release buildType 中启用 minifyEnabled 和 shrinkResources
        # 查找 release { 块并添加配置
        release_pattern = r'(buildTypes\s*\{[^}]*release\s*\{)'
        
        if re.search(release_pattern, content):
            # 检查是否已有 minifyEnabled
            if 'minifyEnabled' not in content:
                content = re.sub(
                    release_pattern,
                    r'\1\n            minifyEnabled true\n            shrinkResources true',
                    content,
                    count=1
                )
                print('✓ 已启用 minifyEnabled 和 shrinkResources')
            else:
                print('⚠️ minifyEnabled 已存在，跳过')
        else:
            print('⚠️ 未找到 release buildType')
        
        # 确保有 proguard 配置
        if 'proguardFiles' not in content:
            content = re.sub(
                r'(minifyEnabled true)',
                r'\1\n            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"',
                content,
                count=1
            )
            print('✓ 已添加 proguard 配置')
        
        with open(gradle_file, 'w') as f:
            f.write(content)
        
        print('✓ 资源压缩配置完成')
        PYTHON_EOF
        
        python3 enable_shrink.py
        
        # 创建 proguard-rules.pro（保留 Capacitor 相关类）
        cat > android/app/proguard-rules.pro << 'PROGUARD_EOF'
        # Capacitor
        -keep class com.getcapacitor.** { *; }
        -keep class com.tehui.offline.** { *; }
        -keep @com.getcapacitor.annotation.CapacitorPlugin class * { *; }
        -keep @com.getcapacitor.PluginMethod public class * { *; }
        
        # WebView
        -keepclassmembers class * {
            @android.webkit.JavascriptInterface <methods>;
        }
        
        # Keep native methods
        -keepclasseswithmembernames class * {
            native <methods>;
        }
        
        # FileProvider
        -keep class androidx.core.content.FileProvider { *; }
        
        # 保留 R 文件
        -keepclassmembers class **.R$* {
            public static <fields>;
        }
        PROGUARD_EOF
        
        echo "✓ proguard-rules.pro 已创建"
        
        # 验证配置
        echo ""
        echo "=== 验证 build.gradle 压缩配置 ==="
        grep -E "minifyEnabled|shrinkResources|proguardFiles" android/app/build.gradle || echo "警告：压缩配置可能未添加"
      
    - name: 授予 Gradle 执行权限
      run: chmod +x android/gradlew
        
    - name: 构建 APK
      run: |
        echo "=== 构建 APK ==="
        cd android
        
        mkdir -p ~/.gradle
        cat > ~/.gradle/gradle.properties << 'EOF'
        org.gradle.daemon=false
        org.gradle.parallel=true
        org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m
        systemProp.http.connectionTimeout=60000
        systemProp.http.socketTimeout=60000
        EOF
        
        if ./gradlew clean assembleRelease --stacktrace --no-daemon; then
          echo "✓ APK 构建成功"
          cd ..
        else
          echo "✗ APK 构建失败"
          cd ..
          exit 1
        fi
        
    - name: 验证和重命名 APK
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        if [ -z "$VERSION" ]; then
          VERSION=$(date +%Y%m%d-%H%M%S)
        fi
        
        echo "=== 处理 APK ==="
        cd android/app/build/outputs/apk/release/
        for apk in *.apk; do
          if [ -f "$apk" ]; then
            APK_NAME="TeHui-v${VERSION}.apk"
            cp "$apk" "../../../../../../$APK_NAME"
            echo "✓ APK: $APK_NAME"
            echo "  大小: $(du -h "$apk" | cut -f1)"
            echo "  MD5: $(md5sum "$apk" | cut -d' ' -f1)"
            break
          fi
        done
        cd ../../../../../../
        
        echo ""
        echo "=== 最终生成的 APK ==="
        ls -lh TeHui-*.apk
        
    - name: 上传 APK 到 Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: TeHui-*.apk
    
    - name: 准备 Cloudflare Pages 部署
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        APK_NAME="TeHui-v${VERSION}.apk"
        
        echo "=== 准备 Cloudflare Pages 部署 ==="
        
        # 检查 APK 文件是否存在
        if [ ! -f "$APK_NAME" ]; then
          echo "✗ 错误: APK 文件不存在: $APK_NAME"
          ls -la *.apk || echo "没有找到任何 APK 文件"
          exit 1
        fi
        
        echo "APK 文件信息:"
        ls -lh "$APK_NAME"
        
        # 复制 APK 到 output 目录
        cp "$APK_NAME" output/
        echo "✓ APK 已复制到 output 目录"
        
        # 验证复制成功
        if [ ! -f "output/$APK_NAME" ]; then
          echo "✗ 错误: APK 复制失败"
          exit 1
        fi
        
        echo "output 目录中的 APK:"
        ls -lh "output/$APK_NAME"
        
        # 更新 version.json 添加 APK 信息
        python3 << PYTHON_EOF
        import json
        import os
        
        version_file = 'output/version.json'
        version = '$VERSION'
        apk_name = '$APK_NAME'
        
        # 读取现有的 version.json
        if os.path.exists(version_file):
            with open(version_file, 'r', encoding='utf-8') as f:
                data = json.load(f)
        else:
            data = {}
        
        # 添加 APK 信息
        data['apk_version'] = version
        data['apk_file'] = apk_name
        data['apk_size'] = os.path.getsize('output/' + apk_name)
        
        # 保存
        with open(version_file, 'w', encoding='utf-8') as f:
            json.dump(data, f, ensure_ascii=False, indent=2)
        
        print(f'✓ version.json 已更新')
        print(f'  APK 版本: {version}')
        print(f'  APK 文件: {apk_name}')
        print(f'  APK 大小: {data["apk_size"]} bytes')
        PYTHON_EOF
        
        # 显示 version.json 内容
        echo ""
        echo "=== version.json 内容 ==="
        cat output/version.json
        
        # 显示 output 目录内容
        echo ""
        echo "=== output 目录 ==="
        ls -lh output/*.apk output/version.json
        
    - name: 创建 Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          TeHui-*.apk
        body: |
          ## 📱 特会信息 ${{ github.ref_name }}
          
          ### 📦 下载说明
          
          **离线版 APK** - 约 50-100 MB
          - 文件名：`TeHui-${{ github.ref_name }}.apk`
          - 特点：包含所有内容，完全离线使用
          - 优势：
            - 无需网络即可使用
            - 所有内容预装，打开即用
            - 适合网络不稳定或无网络环境
          - 注意：内容更新需要重新下载安装新版本 APK
          
          ### 💡 在线版替代方案
          
          如果您想要轻量级的在线版本，推荐使用 **PWA（渐进式 Web 应用）**：
          
          1. 使用浏览器访问：https://cx.zhaozg.cloudns.org/
          2. 点击浏览器菜单中的"添加到主屏幕"或"安装"
          3. PWA 会像 APP 一样显示在主屏幕上
          4. 优势：
             - 轻量级（几 MB）
             - 内容自动更新
             - 支持离线浏览（Service Worker 缓存）
             - 无需下载 APK
          
          ### ⚠️ 安装提示
          
          如果安装时提示"解析包出现问题"：
          1. 确认下载完整（检查文件大小）
          2. 清除旧版本后重新安装
          3. 确保安卓版本 ≥ 5.1（API 22）
          4. 尝试在设置中清除下载管理器的缓存
          5. 检查是否启用了"未知来源"安装权限
          
          ### 📝 版本信息
          - 版本号: ${{ github.ref_name }}
          - 包名: com.tehui.offline
          - 签名状态: ✅ 已签名（可覆盖安装）
          - 构建时间: ${{ github.event.head_commit.timestamp }}
          - 要求：安卓 5.1 或更高版本（API 22+）
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: 等待 Release APK 上传完成
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        echo "⏳ 等待 Release APK 上传完成..."
        VERSION=${GITHUB_REF#refs/tags/v}
        APK_NAME="TeHui-v${VERSION}.apk"
        
        # 最多等待 120 秒
        for i in {1..12}; do
          echo "检查 Release APK... (第 $i 次)"
          
          # 获取 Release 信息
          RELEASE_INFO=$(curl -sf "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ github.ref_name }}" || echo "{}")
          
          # 检查 APK 是否存在
          APK_URL=$(echo "$RELEASE_INFO" | jq -r "(.assets // [])[] | select(.name == \"$APK_NAME\") | .browser_download_url // empty")
          
          if [ -n "$APK_URL" ] && [ "$APK_URL" != "null" ]; then
            echo "✓ APK 已上传: $APK_URL"
            break
          fi
          
          if [ $i -eq 12 ]; then
            echo "⚠️ 等待超时，继续触发部署"
            break
          fi
          
          echo "APK 尚未就绪，等待 10 秒..."
          sleep 10
        done
    
    - name: 触发网站重新部署（包含 APK）
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        echo "🔄 触发 deploy.yml 重新部署..."
        
        # 触发 workflow_dispatch
        curl -X POST \
          -H "Accept: application/vnd.github.v3+json" \
          -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          "https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy.yml/dispatches" \
          -d '{"ref":"main"}'
        
        echo "✓ 已触发网站重新部署"
