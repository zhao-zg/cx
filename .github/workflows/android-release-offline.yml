name: 构建离线版APK

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write
  deployments: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: 设置 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: 设置 Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: 安装 LibreOffice
      run: |
        sudo apt-get update
        sudo apt-get install -y libreoffice
        
    - name: 安装 Python 依赖
      run: pip install -r requirements.txt
      
    - name: 提取并配置版本号
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        if [ -z "$VERSION" ]; then
          VERSION="0.1.0"
        fi
        
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "=== 版本号: $VERSION ==="
        
        # 更新 app_config.json
        echo "更新 app_config.json..."
        python3 << PYTHON_EOF
        import json
        
        with open('app_config.json', 'r', encoding='utf-8') as f:
            config = json.load(f)
        
        config['version'] = '$VERSION'
        
        with open('app_config.json', 'w', encoding='utf-8') as f:
            json.dump(config, f, ensure_ascii=False, indent=2)
        
        print(f'✓ app_config.json 版本号已更新为: $VERSION')
        PYTHON_EOF
        
        # 验证
        cat app_config.json | grep version
        echo ""
      
    - name: 安装 Node.js 依赖
      run: |
        npm install
        echo "✓ Node.js 依赖安装完成"
        npm list --depth=0 | grep capacitor || echo "无"
        
        # 安装代码混淆工具（用于加密）
        npm install -g javascript-obfuscator
        echo "✓ javascript-obfuscator 已安装"
      
    - name: 生成完整静态网站
      run: |
        echo "=== 生成完整静态网站 ==="
        python main.py
        echo "✓ 静态网站生成完成"
        # 删除赞助二维码（APK 走远程获取，不需要打包）
        rm -rf output/images/zanzhu-wx.png output/images/zanzhu-zfb.jpg
        echo "✓ 已移除赞助图片（APK 不打包）"
        du -sh output/
        find output/ -type f | wc -l
        echo "文件总数"
    
    - name: 🔐 混淆 app-update.js (保护下载地址)
      run: |
        echo "=== 混淆敏感文件 ==="
        python encrypt_app_update.py
        echo "✓ app-update.js 已混淆"
        
        # 验证混淆结果（检查混淆器特征）
        if grep -q "_0x" output/js/app-update.js; then
          echo "✅ 混淆成功验证"
          ls -lh output/js/app-update.js
        else
          echo "❌ 混淆可能失败"
          exit 1
        fi
        
        # 删除备份文件（安全措施：避免泄露未混淆源码）
        if [ -f "app-update.js.backup" ]; then
          rm -f app-update.js.backup
          echo "🗑️  已删除备份文件（防止泄露）"
        fi
        
    - name: 生成版本信息文件
      run: |
        echo "=== 生成版本信息文件 ==="
        python generate_version.py
        echo "✓ 版本信息文件已生成"
        
        # 验证 version.json
        if [ -f "output/version.json" ]; then
          echo ""
          echo "=== version.json 内容 ==="
          cat output/version.json | head -20
        else
          echo "⚠️ 警告: version.json 未生成"
        fi
        
    - name: 添加 Android 平台
      run: |
        echo "=== 添加 Android 平台 ==="
        
        # 如果 android 目录已存在（因为 Git 中有自定义插件文件），先删除
        if [ -d "android" ]; then
          echo "检测到 android 目录已存在，先删除..."
          rm -rf android
        fi
        
        npx cap add android
        
        if [ ! -d "android" ]; then
          echo "✗ Android 平台添加失败"
          exit 1
        fi
        
        echo "✓ Android 平台添加完成"
        du -sh android/app/src/main/assets/
    
    - name: 恢复自定义 APK 安装插件文件
      run: |
        echo "=== 恢复自定义 APK 安装插件文件 ==="
        
        # 从 Git 恢复自定义插件文件
        git checkout android/app/src/main/java/com/tehui/offline/MainActivity.java
        git checkout android/app/src/main/java/com/tehui/offline/ApkInstallerPlugin.java
        
        echo ""
        echo "=== 验证插件文件 ==="
        if [ -f "android/app/src/main/java/com/tehui/offline/MainActivity.java" ]; then
          echo "✓ MainActivity.java 已恢复"
          head -5 android/app/src/main/java/com/tehui/offline/MainActivity.java
        else
          echo "✗ MainActivity.java 恢复失败"
          exit 1
        fi
        
        if [ -f "android/app/src/main/java/com/tehui/offline/ApkInstallerPlugin.java" ]; then
          echo "✓ ApkInstallerPlugin.java 已恢复"
          head -5 android/app/src/main/java/com/tehui/offline/ApkInstallerPlugin.java
        else
          echo "✗ ApkInstallerPlugin.java 恢复失败"
          exit 1
        fi
        
        echo ""
        echo "✓ 自定义 APK 安装插件文件已恢复"
    - name: 配置 Android 图标（使用预生成的 PNG）
      run: |
        echo "=== 配置 Android 图标 ==="
        
        # 检查预生成的图标目录
        if [ ! -d "android_icons" ]; then
          echo "✗ 错误: 找不到 android_icons 目录"
          exit 1
        fi
        
        # 复制预生成的图标到 Android 项目
        echo "复制预生成的图标..."
        cp -r android_icons/* android/app/src/main/res/
        
        # 验证图标
        echo ""
        echo "=== 验证图标 ==="
        for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
          icon_file="android/app/src/main/res/mipmap-$density/ic_launcher.png"
          if [ -f "$icon_file" ]; then
            size=$(du -h "$icon_file" | cut -f1)
            echo "✓ mipmap-$density/ic_launcher.png ($size)"
          else
            echo "✗ mipmap-$density/ic_launcher.png 不存在"
          fi
        done
        
        echo ""
        echo "✓ Android 图标配置完成"
      
    - name: 配置 Android 版本信息
      run: |
        echo "=== 配置 Android 版本信息 ==="
        
        # 使用环境变量中的 VERSION
        VERSION=${{ env.VERSION }}
        
        # 计算 versionCode
        IFS='.' read -ra PARTS <<< "$VERSION"
        VERSION_CODE=$((${PARTS[0]} * 10000 + ${PARTS[1]:-0} * 100 + ${PARTS[2]:-0}))
        
        # 创建 variables.gradle
        cat > android/variables.gradle << 'EOF'
        ext {
            minSdkVersion = 22
            compileSdkVersion = 34
            targetSdkVersion = 34
            androidxActivityVersion = '1.8.0'
            androidxAppCompatVersion = '1.6.1'
            androidxCoordinatorLayoutVersion = '1.2.0'
            androidxCoreVersion = '1.12.0'
            androidxFragmentVersion = '1.6.2'
            coreSplashScreenVersion = '1.0.1'
            androidxWebkitVersion = '1.9.0'
            junitVersion = '4.13.2'
            androidxJunitVersion = '1.1.5'
            androidxEspressoCoreVersion = '3.5.1'
            cordovaAndroidVersion = '10.1.1'
        }
        EOF
        
        # 配置版本号
        echo "当前版本: $VERSION"
        echo "版本代码: $VERSION_CODE"
        
        # 使用 Python 脚本来可靠地修改 build.gradle
        cat > update_version.py << 'PYTHON_EOF'
        import re
        import sys
        
        gradle_file = 'android/app/build.gradle'
        version_code = sys.argv[1]
        version_name = sys.argv[2]
        
        with open(gradle_file, 'r') as f:
            content = f.read()
        
        # 替换或添加 versionCode
        if re.search(r'versionCode\s+\d+', content):
            content = re.sub(r'versionCode\s+\d+', f'versionCode {version_code}', content)
            print(f'✓ 替换 versionCode: {version_code}')
        else:
            content = re.sub(r'(defaultConfig\s*\{)', rf'\1\n        versionCode {version_code}', content)
            print(f'✓ 插入 versionCode: {version_code}')
        
        # 替换或添加 versionName
        if re.search(r'versionName\s+"[^"]*"', content):
            content = re.sub(r'versionName\s+"[^"]*"', f'versionName "{version_name}"', content)
            print(f'✓ 替换 versionName: {version_name}')
        else:
            content = re.sub(r'(defaultConfig\s*\{)', rf'\1\n        versionName "{version_name}"', content)
            print(f'✓ 插入 versionName: {version_name}')
        
        # 确保有 namespace
        if not re.search(r'namespace\s+["\']', content):
            content = re.sub(r'(android\s*\{)', r'\1\n    namespace "com.tehui.offline"', content)
            print('✓ 插入 namespace: com.tehui.offline')
        
        with open(gradle_file, 'w') as f:
            f.write(content)
        
        print(f'\n✓ 版本配置完成: versionCode={version_code}, versionName={version_name}')
        PYTHON_EOF
        
        python3 update_version.py "$VERSION_CODE" "$VERSION"
        
        # 验证版本号是否正确注入
        echo ""
        echo "=== 验证 build.gradle 中的版本信息 ==="
        grep -A 10 "defaultConfig" android/app/build.gradle | grep -E "(versionCode|versionName)" || echo "警告: 未找到版本信息"
        
        echo ""
      
    - name: 同步 Capacitor
      run: |
        echo "=== 同步 Capacitor ==="
        npx cap sync android
        echo "✓ 同步完成"
        
        echo ""
        echo "=== 验证资源大小 ==="
        du -sh android/app/src/main/assets/
        find android/app/src/main/assets/ -type f | wc -l
    
    - name: 重新应用自定义图标（sync 后）
      run: |
        echo "=== 重新应用自定义图标 ==="
        echo "注意：cap sync 可能会覆盖图标，需要重新复制"
        
        # 删除可能存在的默认图标
        rm -rf android/app/src/main/res/mipmap-*
        
        # 复制预生成的图标
        cp -r android_icons/* android/app/src/main/res/
        
        # 验证图标已复制
    
    - name: 配置自定义插件和 AndroidManifest（sync 后）
      run: |
        echo "=== 配置自定义插件和 AndroidManifest ==="
        
        # 删除 Capacitor 生成的默认 MainActivity
        rm -f android/app/src/main/java/com/tehui/offline/MainActivity.java
        
        # 从 Git 恢复自定义插件文件
        mkdir -p android/app/src/main/java/com/tehui/offline
        git checkout HEAD -- android/app/src/main/java/com/tehui/offline/MainActivity.java
        git checkout HEAD -- android/app/src/main/java/com/tehui/offline/ApkInstallerPlugin.java
        
        # 验证插件文件
        if [ ! -f "android/app/src/main/java/com/tehui/offline/MainActivity.java" ]; then
          echo "✗ MainActivity.java 恢复失败"
          exit 1
        fi
        if [ ! -f "android/app/src/main/java/com/tehui/offline/ApkInstallerPlugin.java" ]; then
          echo "✗ ApkInstallerPlugin.java 恢复失败"
          exit 1
        fi
        echo "✓ 自定义插件文件已恢复"
        
        manifest_file="android/app/src/main/AndroidManifest.xml"
        
        # 使用 Python 脚本修改 AndroidManifest.xml
        cat > modify_manifest.py << 'PYTHON_EOF'
        import re
        
        manifest_file = 'android/app/src/main/AndroidManifest.xml'
        
        with open(manifest_file, 'r') as f:
            content = f.read()
        
        # 查找并替换 MainActivity 引用
        patterns = [
            (r'android:name="\.MainActivity"', 'android:name="com.tehui.offline.MainActivity"'),
            (r'android:name="MainActivity"', 'android:name="com.tehui.offline.MainActivity"'),
            (r'android:name="(?!com\.tehui\.offline\.MainActivity)[^"]*MainActivity"', 'android:name="com.tehui.offline.MainActivity"'),
        ]
        
        modified = False
        for pattern, replacement in patterns:
            matches = re.findall(pattern, content)
            if matches:
                content = re.sub(pattern, replacement, content)
                modified = True
        
        if not modified:
            activity_match = re.search(r'<activity([^>]*)>', content)
            if activity_match:
                activity_tag = activity_match.group(0)
                if 'android:name=' in activity_tag:
                    new_tag = re.sub(r'android:name="[^"]*"', 'android:name="com.tehui.offline.MainActivity"', activity_tag)
                    content = content.replace(activity_tag, new_tag)
                    modified = True
                else:
                    new_tag = activity_tag.replace('<activity', '<activity android:name="com.tehui.offline.MainActivity"')
                    content = content.replace(activity_tag, new_tag)
                    modified = True
        
        with open(manifest_file, 'w') as f:
            f.write(content)
        
        if modified:
            print('✓ AndroidManifest.xml 已修改')
        else:
            print('✗ 无法修改 AndroidManifest.xml')
            exit(1)
        PYTHON_EOF
        
        python3 modify_manifest.py
        
        # 验证是否成功
        if grep -q "com.tehui.offline.MainActivity" "$manifest_file"; then
          echo "✓ AndroidManifest.xml 配置完成"
        else
          echo "✗ 验证失败"
          exit 1
        fi


    - name: 配置网络安全策略
      run: |
        echo "=== 配置网络安全策略 ==="
        mkdir -p android/app/src/main/res/xml
        cat > android/app/src/main/res/xml/network_security_config.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <network-security-config>
            <base-config cleartextTrafficPermitted="true">
                <trust-anchors>
                    <certificates src="system" />
                </trust-anchors>
            </base-config>
        </network-security-config>
        EOF
        
        if ! grep -q "networkSecurityConfig" android/app/src/main/AndroidManifest.xml; then
          sed -i 's/<application/<application android:networkSecurityConfig="@xml\/network_security_config"/' android/app/src/main/AndroidManifest.xml
        fi
        
        echo "✓ 网络安全配置完成"
        
        echo ""
        echo "=== 配置 APK 安装权限 ==="
        
        manifest_file="android/app/src/main/AndroidManifest.xml"
        
        # 添加 APK 安装权限（Android 8.0+）
        if ! grep -q "REQUEST_INSTALL_PACKAGES" "$manifest_file"; then
          # 在 <manifest> 标签后添加权限
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.REQUEST_INSTALL_PACKAGES" />' "$manifest_file"
          echo "✓ 添加 REQUEST_INSTALL_PACKAGES 权限"
        fi
        
        # 添加存储权限（Android 10 以下）
        if ! grep -q "WRITE_EXTERNAL_STORAGE" "$manifest_file"; then
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="32" />' "$manifest_file"
          echo "✓ 添加 WRITE_EXTERNAL_STORAGE 权限"
        fi
        
        if ! grep -q "READ_EXTERNAL_STORAGE" "$manifest_file"; then
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />' "$manifest_file"
          echo "✓ 添加 READ_EXTERNAL_STORAGE 权限"
        fi
        
        # 添加 FileProvider 配置
        if ! grep -q "FileProvider" "$manifest_file"; then
          # 创建 file_paths.xml
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/file_paths.xml << 'FILEPATHS_EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <paths xmlns:android="http://schemas.android.com/apk/res/android">
            <cache-path name="cache" path="." />
            <external-path name="external" path="." />
            <external-cache-path name="external_cache" path="." />
            <external-path name="downloads" path="Download/" />
        </paths>
        FILEPATHS_EOF
          
          # 在 </application> 前添加 FileProvider
          sed -i 's|</application>|        <provider\n            android:name="androidx.core.content.FileProvider"\n            android:authorities="${applicationId}.fileprovider"\n            android:exported="false"\n            android:grantUriPermissions="true">\n            <meta-data\n                android:name="android.support.FILE_PROVIDER_PATHS"\n                android:resource="@xml/file_paths" />\n        </provider>\n    </application>|' "$manifest_file"
          echo "✓ 添加 FileProvider 配置"
        fi
        
        # 添加 queries 配置（Android 11+）
        if ! grep -q "<queries>" "$manifest_file"; then
          sed -i '/<manifest/a\    <queries>\n        <intent>\n            <action android:name="android.intent.action.VIEW" />\n            <data android:mimeType="application/vnd.android.package-archive" />\n        </intent>\n    </queries>' "$manifest_file"
          echo "✓ 添加 queries 配置（Android 11+）"
        fi
        
        echo ""
        echo "=== 验证 AndroidManifest.xml ==="
        echo "检查权限配置..."
        grep -E "REQUEST_INSTALL_PACKAGES|WRITE_EXTERNAL_STORAGE|FileProvider|queries" "$manifest_file" || echo "警告：部分配置可能未添加"
        
        echo ""
        echo "=== 验证应用配置 ==="
        # 确保应用名称正确
        if grep -q "android:label=" "$manifest_file"; then
          sed -i 's/android:label="[^"]*"/android:label="特会"/' "$manifest_file"
          echo "✓ 应用名称已设置为 特会"
        fi
        
        # 显示 AndroidManifest.xml 的关键部分
        echo ""
        echo "AndroidManifest.xml 关键配置:"
        grep -A 3 "<application" "$manifest_file" | head -5
        
        echo ""
        echo "✓ AndroidManifest 配置完成"
      
    - name: 创建签名密钥
      run: |
        echo "=== 创建签名密钥 ==="
