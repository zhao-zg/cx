# 通用批量处理配置
batch_processing:
  enabled: true
  skip_existing: false
  strict_exit_on_batch_failure: false  # false: 部分失败也返回0；true: 只要有失败就返回1
  max_latest_trainings: 5  # GitHub 打包最多保留最新 N 个训练
  # specific_trainings: []  # 注释掉此行，默认生成所有可用训练

# 赞助功能（关闭后不发布二维码图片，前端自动隐藏顾念微工入口）
sponsor_enabled: false

# 全局配置
output_dir: "output"
resource_base_dir: "resource"
template_dir: "src/templates"
static_dir: "src/static"

# 默认训练配置（可选，仅当无法从文件夹名自动识别时使用）
# 程序会自动从文件夹名称提取年份和季节，例如：
#   - "2025-秋季" → year: 2025, season: "秋季"
#   - "2025-夏季" → year: 2025, season: "夏季"
# 标题和副标题始终从文档中自动提取
default_training:
  year: 2025  # 后备年份
  season: "秋季"  # 后备季节

# 远程服务器地址（main.py 读取后生成 output/js/remote-config.js，URL 以 base64 存储并混淆）
remote_servers:
  cloudflare:
    - https://cx.1189.dpdns.org/
    - https://cx.zhaozg.cloudns.org/
    - https://cx.zhaozg.dpdns.org/
  github_api: https://api.github.com/repos/zhao-zg/cx/releases/latest
  github_mirrors:
    - https://gh-proxy.com/
    - https://ghproxy.net/
    - https://proxy.11891189.xyz/
    - https://proxy.07170501.xyz/
  push:
    - https://moepush.zhaozg.cloudns.org/api/push/O0aR8LBgLYWnnwC1
    - https://moepush.zhaozg.dpdns.org/api/push/O0aR8LBgLYWnnwC1
  ip_apis:
    - https://myip.ipip.net
    - https://ipinfo.io/json
