# 通用批量处理配置
batch_processing:
  enabled: true
  skip_existing: false
  strict_exit_on_batch_failure: false  # false: 部分失败也返回0；true: 只要有失败就返回1
  max_latest_trainings: 5  # GitHub 打包最多保留最新 N 个训练
  # specific_trainings: []  # 注释掉此行，默认生成所有可用训练

# 赞助功能（关闭后不发布二维码图片，前端自动隐藏顾念微工入口）
sponsor_enabled: false

# 服务端访问时间段控制（北京时间 UTC+8）
# 不在允许访问时间段内，所有请求返回 403
# 注释掉 enabled: true 或删除此节即可关闭限制
access_time:
  enabled: true
  timezone_offset: 8 # UTC 偏移（北京时间 = +8）
  # ── 统一配置（后备） ──────────────────────────────────
  # 当某天未在 daily_schedule 中配置时，使用此统一时间
  # 若 daily_schedule 覆盖了所有天，则这两项不会用到
  allow_start: 0    # 允许访问的开始时间（整点，0-23）
  allow_end: 8     # 允许访问的结束时间（整点，0-23，不含该小时）
  # 允许访问的星期（0=周日, 1=周一, 2=周二, 3=周三, 4=周四, 5=周五, 6=周六）
  # 注释掉或删除此行表示每天均可访问
  allow_days: [0, 4]  # 例如仅工作日

  # ── 按天配置（优先级高于统一配置） ────────────────────
  # 每天可配置不同的开放时间段；不配置某天则使用上面的统一配置
  # 如果某天既不在 daily_schedule 中，统一配置也未设置，则该天不可访问
  # 格式：day_number: { start: 开始小时, end: 结束小时 }
  daily_schedule:
    0: { start: 1, end: 12 }    # 周日 1:00-12:00
    4: { start: 22, end: 24 }   # 周四 0:00-24:00

  # ── 管理员直通（无单独 token） ────────────────────────
  # 前端管理面板密码验证成功后自动设置 cx_admin_auth cookie，
  # 持有该 cookie 的请求自动跳过时间段检查（无需额外配置）。
  # 管理面板入口：首页 Logo 连点 5 次，密码见 src/static/index.html。

# 全局配置
output_dir: "output"
resource_base_dir: "resource"
template_dir: "src/templates"
static_dir: "src/static"

# 默认训练配置（可选，仅当无法从文件夹名自动识别时使用）
# 程序会自动从文件夹名称提取年份和季节，例如：
#   - "2025-秋季" → year: 2025, season: "秋季"
#   - "2025-夏季" → year: 2025, season: "夏季"
# 标题和副标题始终从文档中自动提取
default_training:
  year: 2025  # 后备年份
  season: "秋季"  # 后备季节

# 远程服务器地址（main.py 读取后生成 output/js/remote-config.js，URL 以 base64 存储并混淆）
