    - https://cx.1189.dpdns.org/
    - https://cx.zhaozg.cloudns.org/
    - https://cx.zhaozg.dpdns.org/
  github_api: https://api.github.com/repos/zhao-zg/cx/releases/latest
  github_mirrors:
    - https://gh-proxy.com/
    - https://ghproxy.net/
    - https://proxy.11891189.xyz/
    - https://proxy.07170501.xyz/
  push:
    - https://moepush.zhaozg.cloudns.org/api/push/O0aR8LBgLYWnnwC1
    - https://moepush.zhaozg.dpdns.org/api/push/O0aR8LBgLYWnnwC1
  ip_apis:
    - https://myip.ipip.net
    - https://ipinfo.io/json
