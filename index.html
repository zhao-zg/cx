<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="特会信息合集 - 所有训练总览">
    <meta name="theme-color" content="#fafbff">
    <meta name="training-title" content="">
    <meta name="app-version" content="">
    <!-- 防止主题跳色：在渲染前设置主题 -->
    <script>(function(){var d=document.documentElement,m=document.querySelector('meta[name="theme-color"]'),s=null,t='cool';try{s=localStorage.getItem('readingTheme')}catch(e){}if(s==='cool'||s==='warm'||s==='dark'){t=s}d.setAttribute('data-theme',t);if(m){m.setAttribute('content',t==='warm'?'#F7F2E8':(t==='dark'?'#181b21':'#fafbff'));}})();</script>
    <!-- 伪装检测 -->
    <script>(function(){var ok=false;try{if(sessionStorage.getItem('cx_access')==='ok')ok=true;}catch(e){}if(!ok&&window.location.search.indexOf('zzg')!==-1){try{sessionStorage.setItem('cx_access','ok');}catch(e){}ok=true;}if(!ok&&window.location.hash&&window.location.hash.length>2){ok=true;}if(!ok){var isCap=window.Capacitor!==undefined||window.location.protocol==='capacitor:'||window.location.hostname==='localhost';var isPwa=window.navigator.standalone===true||(window.matchMedia&&window.matchMedia('(display-mode: standalone)').matches);if(!isCap&&!isPwa)document.documentElement.classList.add('cx-disguise');}})();</script>

    <meta name="apple-mobile-web-app-capable" content="yes">

    <title>特会信息合集</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body{padding-bottom:calc(16px + env(safe-area-inset-bottom, 0px));padding-top:env(safe-area-inset-top, 0px)}
        .container{padding:0;overflow:hidden}
        .header{color:var(--header-text);margin-bottom:20px}
        .content{padding:0}
        @media(min-width:768px){.header{margin-bottom:30px}}
        .trainings-grid{display:flex;flex-direction:column;gap:1px;margin:0;background:var(--group-divider-bg);overflow:hidden;border-radius:12px}
        .training-card{background:var(--surface);overflow:hidden;transition:background-color .2s}
        .training-card:hover{background:var(--nav-hover)}
        .training-card-wrapper{display:flex;align-items:stretch;gap:0}
        .training-link{display:block;padding:14px 16px;text-decoration:none;color:inherit;flex:1;min-width:0;transition:background-color .2s;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none}
        .training-link:active{background:var(--nav-hover)}
        .training-info{position:relative}
        .training-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;gap:8px}
        .skeleton-item{padding:16px;border-bottom:1px solid var(--border)}
        .skeleton-line{height:18px;background:linear-gradient(90deg,var(--surface-alt) 25%,var(--muted) 50%,var(--surface-alt) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:4px;margin-bottom:8px}
        .skeleton-line.short{width:30%;height:14px}
        @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
        .training-card .year-season{font-size:17px;color:var(--brand);font-weight:600;flex-shrink:0;line-height:1.3}
        .training-card .info{color:var(--text-muted);font-size:16px;white-space:nowrap;flex-shrink:0}
        .training-title-row{display:flex;align-items:center;gap:6px;margin-bottom:0}
        .training-card .title{font-size:1.05em;color:var(--text);line-height:1.6;font-weight:500;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;border-radius:4px;min-height:32px;flex:1}
        .training-title-row .arrow{margin-left:auto;color:var(--text-muted);font-weight:600;flex-shrink:0}
        .logo-trigger{cursor:pointer;user-select:none}
        .footer-meta{margin-top:10px;font-size:.9em}
        .home-status{padding:40px 20px;text-align:center;background:var(--surface);color:var(--text-muted)}
        .home-status.error{color:var(--danger-text)}
        .home-status-icon{font-size:24px;margin-bottom:10px}
        .home-retry-btn{margin-top:20px;padding:10px 20px;background:var(--btn-primary-bg);color:var(--btn-primary-text);border:1px solid var(--btn-primary-border);border-radius:6px;cursor:pointer;font:inherit;font-weight:600;box-shadow:var(--shadow-sm)}
        .home-retry-btn:active{transform:scale(.98)}
        .footer{text-align:center;padding:16px;color:var(--text-muted);background:var(--surface-alt);border-top:1px solid var(--border)}
        /* 清除数据对话框（cx-dialog-mask/cx-dialog/title/desc 已移入 style.css 统一管理）*/
        .cx-dialog-opts{display:flex;flex-direction:column;gap:8px;padding:0 16px 14px}
        .cx-dialog-opt{display:flex;align-items:flex-start;gap:11px;padding:11px 12px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;background:var(--surface-alt);transition:border-color .15s,background .15s;-webkit-tap-highlight-color:transparent}
        .cx-dialog-opt.selected{border-color:var(--brand);background:var(--interactive-soft-bg)}
        .cx-dialog-opt-icon{font-size:20px;flex-shrink:0;margin-top:1px}
        .cx-dialog-opt-body{flex:1}
        .cx-dialog-opt-title{font-size:13px;font-weight:600;color:var(--heading);margin-bottom:2px}
        .cx-dialog-opt-sub{font-size:11px;color:var(--text-muted);line-height:1.5}
        .cx-dialog-actions{display:flex;border-top:1px solid var(--border)}
        .cx-dialog-cancel{flex:1;padding:13px;background:none;border:none;font-size:14px;color:var(--text-muted);cursor:pointer;border-right:1px solid var(--border)}
        .cx-dialog-confirm{flex:1;padding:13px;background:none;border:none;font-size:14px;font-weight:600;color:var(--danger-text);cursor:pointer}
        .cx-dialog-confirm:active,.cx-dialog-cancel:active{background:var(--surface-alt)}
        .cache-status{margin-top:6px;font-size:12px;color:var(--text-muted);text-align:center;min-height:14px;padding:0}
        .cache-status.success{color:var(--success-text)}
        .cache-status.error{color:var(--danger-text)}
        .cache-status.warning{color:var(--warning-text)}
        /* 伪装页 */
        html.cx-disguise .container,html.cx-disguise .footer,html.cx-disguise #app{display:none!important}
        #cxMaintenance{display:none;position:fixed;inset:0;z-index:9999;background:var(--surface,#fff);flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;box-sizing:border-box}
        html.cx-disguise #cxMaintenance{display:flex}
        .cx-maint-icon{font-size:64px;margin-bottom:24px;cursor:default;-webkit-tap-highlight-color:transparent;user-select:none}
        .cx-maint-title{font-size:20px;font-weight:600;color:var(--text,#333);margin-bottom:12px}
        .cx-maint-sub{font-size:14px;color:var(--text-muted,#999);text-align:center;line-height:1.7;max-width:280px}
        /* PWA 强制安装遮罩 */
        .cx-install-mask{display:flex;position:fixed;inset:0;z-index:9500;background:rgba(0,0,0,.72);align-items:center;justify-content:center;padding:20px;box-sizing:border-box}
        .cx-install-box{background:var(--surface,#fff);border-radius:16px;width:min(320px,calc(100vw - 40px));box-shadow:0 8px 40px rgba(0,0,0,.35);overflow:hidden;text-align:center;padding:28px 24px 22px}
        .cx-install-icon{font-size:44px;margin-bottom:10px}
        .cx-install-title{font-size:17px;font-weight:700;color:var(--heading,#111);margin-bottom:6px}
        .cx-install-sub{font-size:12px;color:var(--text-muted,#888);margin-bottom:18px;line-height:1.65}
        .cx-install-progress{height:4px;background:var(--border,#e0e0e0);border-radius:2px;margin-bottom:14px;overflow:hidden}
        .cx-install-progress-bar{height:100%;background:var(--brand,#007aff);border-radius:2px;width:0%;transition:width .3s ease}
        .cx-install-status{font-size:12px;color:var(--text-muted,#666);min-height:16px;margin-bottom:14px;line-height:1.5}
        .cx-install-retry{display:none;padding:9px 22px;background:var(--brand,#007aff);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
        /* 离线横幅 */
        #cxOfflineBanner{display:none;position:fixed;top:0;left:0;right:0;z-index:8000;background:#e65100;color:#fff;padding:11px 16px;font-size:13px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.2);line-height:1.5}
        #cxOfflineBanner.show{display:block}
        #cxOfflineBanner .cx-banner-dismiss{background:rgba(255,255,255,.25);border:none;color:#fff;padding:3px 10px;border-radius:4px;margin-left:8px;font-size:12px;cursor:pointer;vertical-align:middle;-webkit-tap-highlight-color:transparent}
        /* 章节/批次视图容器 */
        #app{min-height:100vh}
        /* 启动加载页 */
        #cxSplash{position:fixed;inset:0;z-index:9800;background:var(--surface,#fafbff);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 32px;box-sizing:border-box;transition:opacity .45s ease;pointer-events:none}
        #cxSplash.cx-splash-out{opacity:0}
        .cx-splash-ref{font-size:15px;color:var(--brand,#007aff);font-weight:600;letter-spacing:.08em;margin-bottom:10px;text-align:center}
        .cx-splash-verse{font-size:17px;color:var(--text,#1a1a1a);text-align:center;line-height:2;font-weight:400}
    </style>
</head>
<body>
    <!-- 启动加载页 -->
    <div id="cxSplash">
        <div class="cx-splash-ref">诗篇 119:148</div>
        <div class="cx-splash-verse">我趁夜更未换，将眼睁开，<br>为要默想你的话语。</div>
    </div>
    <script>(function(){
        // APP / PWA 统一使用 HTML #cxSplash 启动加载页
        var _splashDone=false;
        function _dismissSplash(){
            if(_splashDone)return;_splashDone=true;
            var el=document.getElementById('cxSplash');
            if(!el)return;
            el.classList.add('cx-splash-out');
            setTimeout(function(){if(el&&el.parentNode)el.parentNode.removeChild(el);},480);
        }
        if(document.readyState==='complete')_dismissSplash();
        else window.addEventListener('load',_dismissSplash);
        setTimeout(_dismissSplash,4000);
    })();</script>
    <!-- 阅读进度条 -->
    <div id="cxReadingProgress" class="cx-reading-progress"></div>
    <!-- 伪装维护页 -->
    <div id="cxMaintenance">
        <div class="cx-maint-icon" id="cxMaintTrigger">📱</div>
        <div class="cx-maint-title" id="cxMaintTitle"></div>
        <div class="cx-maint-sub" id="cxMaintSub"></div>
    </div>
    <script>(function(){
        var isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream;
        var icon=document.getElementById('cxMaintTrigger');
        var title=document.getElementById('cxMaintTitle');
        var sub=document.getElementById('cxMaintSub');
        if(isIOS){if(icon)icon.textContent='📲';if(title)title.textContent='添加到主屏幕';if(sub)sub.textContent='请发送到桌面缓存使用，在线版已不支持，请谅解';}
        else{if(icon)icon.textContent='📦';if(title)title.textContent='请下载 APK 离线使用';if(sub)sub.textContent='请下载APK离线使用，在线版已不支持，请谅解';}
        var cnt=0,t=0;
        if(icon)icon.addEventListener('click',function(){clearTimeout(t);cnt++;if(cnt>=20){try{sessionStorage.setItem('cx_access','ok');}catch(e){}location.reload();}else{t=setTimeout(function(){cnt=0;},999);}});
    })();</script>

    <!-- PWA 离线提示横幅 -->

        📶 需要网络连接才能首次安装缓存

    <!-- ── 首页视图（静态，默认显示）──────────────────────────────── -->
    <div id="homeView">
        <div class="container">
            <div class="header">
                <h1 id="mainLogo" class="logo-trigger">🏠 特会信息合集</h1>
                <p class="subtitle">Conference Information Collections</p>
                <button type="button" id="cx-search-btn" style="margin-top:10px;padding:7px 18px;background:var(--surface-alt);color:var(--brand);border:1.5px solid var(--border);border-radius:20px;font:inherit;font-size:14px;cursor:pointer;-webkit-tap-highlight-color:transparent">🔍 搜索内容</button>
            </div>

    <!-- APK 更新（仅在 APP / PWA 中加载） -->
    <script>(function(){
        var isCapacitor=window.Capacitor!==undefined;
        var isCapacitorScheme=window.location.protocol==='capacitor:'||window.location.hostname==='localhost';
        var isPwaStandalone=!!(window.matchMedia&&window.matchMedia('(display-mode: standalone)').matches)||!!navigator.standalone;
        if(isCapacitor||isCapacitorScheme||isPwaStandalone){
            var s=document.createElement('script');s.src='js/app-update.js';document.head.appendChild(s);
        }

    <script>
    // ── 全局根路径 ────────────────────────────────────────────────────────
    window.CX_ROOT = './';
    window.CX_MAX_LATEST_TRAININGS = 7;
    window.CX = window.CX || {};

    // ── 核心资源 URL 列表（用于 PWA 缓存校验）────────────────────────────
    window.__cxCoreUrls = [
        './','./manifest.json','./sw.js',
        './version.json','./trainings.json','./app_config.json',
        './css/style.css',
        './js/ref-detector.js','./js/training-enricher.js','./js/router.js','./js/renderer.js',
        './js/dev-console.js','./js/theme-toggle.js','./js/search.js','./js/speech.js',
        './js/outline.js','./js/scripture-popup.js','./js/image-utils.js',
        './js/remote-config.js','./js/nav-stack.js','./js/race-fastest.js',
        './js/bible-dict.js','./js/highlight.js','./js/bookmark.js',
        './js/txt-importer.js','./js/resource-pack.js',
        './vendor/localforage.min.js','./vendor/jszip.min.js',
        './icons/icon-192.png','./icons/icon-512.png'
    ];

    // ── 环境检测 ──────────────────────────────────────────────────────────
    var CX_ENV = (function(){
        return {
            isAndroid:/Android/i.test(navigator.userAgent),
            isIOS:/iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream,
            isCapacitor:window.Capacitor!==undefined,
            isCapacitorScheme:window.location.protocol==='capacitor:'||window.location.hostname==='localhost',
            isStandalone:window.navigator.standalone===true||(window.matchMedia&&window.matchMedia('(display-mode: standalone)').matches),
            get isInApp(){return this.isStandalone;},
            get isCapacitorApp(){return this.isCapacitor||this.isCapacitorScheme;}
        };
    })();

    // ── SPA 视图切换辅助 ──────────────────────────────────────────────────
    // CXRouter 会调用 CXRenderer，renderer 内部调用 _showApp() / _showHome()
    // 这两个函数注册到 CXRenderer 里；这里提前注册以便 renderer.js 可以访问
    window._cxShowHome = function() {
        document.getElementById('homeView').style.display = '';
        document.getElementById('app').style.display = 'none';
        document.title = '特会信息合集';
        window.scrollTo(0, 0);
    };
    window._cxShowApp = function() {
        document.getElementById('homeView').style.display = 'none';
        document.getElementById('app').style.display = '';
    };

    // ── Capacitor 版本获取 ────────────────────────────────────────────────
    (function(){
        var isCapacitor=window.Capacitor&&window.Capacitor.Plugins&&window.Capacitor.Plugins.App;
        if(isCapacitor){
            window.Capacitor.Plugins.App.getInfo().then(function(info){
                if(info.version)localStorage.setItem('cx_apk_version',info.version);
            }).catch(function(){});
        }
    })();

    // ── 动态加载训练列表 ──────────────────────────────────────────────────
    (function(){
        fetch('trainings.json?t='+Date.now())
            .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
            .then(function(data){
                window.__cxTrainings=data.trainings||[];
                renderTrainings(data);
                // 更新页脚时间
                var fm=document.getElementById('footerMeta');
                if(fm&&data.generation_time)fm.textContent='生成时间: '+data.generation_time;
            })
            .catch(function(err){
                console.error('[训练列表]',err);
                showLoadError();
            });

        function renderTrainings(data){
            var grid=document.getElementById('trainingsGrid');
            if(!grid)return;
            var allTrainings=data.trainings||[];
            // 只显示最新 N 个「转换训练」（排除合辑，合辑需下载后才显示）
            var displayTrainings=allTrainings.filter(function(t){return!t.is_collection;}).slice(0,window.CX_MAX_LATEST_TRAININGS||5);

            function buildCard(t){
                var yr=String(t.year||'');
                var yearSeason=t.year+'-'+(t.season.split(' ')[0]||t.season);
                var titleText=t.season.split(' ').slice(1).join(' ')||t.title||t.season;
                var localBadge=t.is_local?'<span style="display:inline-block;font-size:10px;padding:1px 5px;background:var(--interactive-soft-bg,rgba(var(--brand-rgb,0,112,204),0.1));color:var(--brand);border:1px solid var(--brand);border-radius:4px;margin-left:4px;vertical-align:middle;line-height:1.4;white-space:nowrap">本地导入</span>':'';
                var packBadge=t.is_pack?'<span style="display:inline-block;font-size:10px;padding:1px 5px;background:rgba(140,80,200,.1);color:#7a3aaa;border:1px solid #7a3aaa;border-radius:4px;margin-left:4px;vertical-align:middle;line-height:1.4;white-space:nowrap">历史合辑</span>':'';
                return '<div class="training-card">'
                    +'<div class="training-card-wrapper">'
                    +'<div class="training-link" onclick="window.CXRouter&&CXRouter.navigate(\''+t.path+'\')" role="button" tabindex="0">'
                    +'<div class="training-info">'
                    +'<div class="training-header">'
                    +'<div class="year-season">'+yearSeason+'</div>'
                    +'<div class="info">共 '+t.chapter_count+' 篇</div>'
                    +'</div>'
                    +'<div class="training-title-row">'
                    +'<div class="title">'+titleText+localBadge+packBadge+'</div>'
                    +'<span class="arrow">→</span>'
                    +'</div>'
                    +'</div>'
                    +'</div>'
                    +'</div>'
                    +'</div>';
            }

            function buildGridHtml(list){
                if(!list.length)return'<div class="home-status">暂无训练内容</div>';
                var html='',currentYear=null;
                list.forEach(function(t){
                    var yr=String(t.year||'');
                    if(yr&&yr!==currentYear){currentYear=yr;html+='<div class="cx-year-header-row">'+yr+'</div>';}
                    html+=buildCard(t);
                });
                return html;
            }

            // 构建训练页面列表（仅最新 7 个，供 PWA 缓存用）
            var pages=[];
            displayTrainings.forEach(function(t){
                pages.push('./'+t.path+'/training.json');
                (t.images||[]).forEach(function(img){pages.push('./'+t.path+'/'+img);});
            });
            window.__cxTrainingPages=pages;
            // PWA 显示缓存按钮
            if(CX_ENV.isStandalone){
                var cBtn=document.getElementById('cacheAllBtn');
                if(cBtn)cBtn.style.display='inline-flex';
            }

            // ── refreshHomeGrid：刷新主页 grid（每次导航回主页时调用）──
            window.refreshHomeGrid=function(){
                var g=document.getElementById('trainingsGrid');
                if(!g)return;

                function renderWithLocals(cachedList,namedCacheSet){
                    // 读取历史合辑来源记录（cx_pack_sources），仅对非初始数据的训练打标（初始数据优先级高于历史合辑）
                    namedCacheSet=namedCacheSet||{};
                    var packSources={};
                    try{packSources=JSON.parse(localStorage.getItem('cx_pack_sources')||'{}');}catch(e){}
                    cachedList.forEach(function(t){if(!namedCacheSet[t.path]&&packSources[t.path])t.is_pack=true;});
                    if(window.CXLocalImport){
                        window.CXLocalImport.listImports().then(function(localItems){
                            // 本地导入与网络训练合并共存（冲突序号已在导入时自动重分配）
                            var combined=localItems.concat(cachedList);
                            // 按 YYYY-NN 倒序（local- 前缀去掉后再比较）
                            combined.sort(function(a,b){
                                var ka=a.path.replace(/^local-/,'');
                                var kb=b.path.replace(/^local-/,'');
                                return kb.localeCompare(ka);
                            });
                            g.innerHTML=buildGridHtml(combined.length?combined:displayTrainings);
                        }).catch(function(){
                            g.innerHTML=buildGridHtml(cachedList.length?cachedList:displayTrainings);
                        });
                    } else {
                        g.innerHTML=buildGridHtml(cachedList.length?cachedList:displayTrainings);
                    }
                }

                if(!('caches' in window)){renderWithLocals(displayTrainings);return;}
                // 检查全部训练是否已缓存：先用 caches.keys() 快速找到 cx-YYYY-NN 独立缓存，
                // 再对剩余项做 caches.match（覆盖 cx-main 资源包下载的训练）
                var all=allTrainings.length?allTrainings:displayTrainings;
                caches.keys().then(function(keys){
                    var keySet={};keys.forEach(function(k){keySet[k]=true;});
                    var byKey=all.filter(function(t){return keySet['cx-'+t.path];});
                    var rest=all.filter(function(t){return!keySet['cx-'+t.path];});
                    // 构建初始数据 path 集合（有命名缓存 cx-YYYY-NN），用于屏蔽错误的历史合辑标记
                    var namedCacheSet={};
                    byKey.forEach(function(t){namedCacheSet[t.path]=true;});
                    if(!rest.length){
                        renderWithLocals(byKey.length?byKey:displayTrainings,namedCacheSet);
                        return;
                    }
                    return Promise.all(rest.map(function(t){
                        return caches.match(window.location.origin+'/'+t.path+'/training.json')
                            .then(function(r){return!!r;},function(){return false;});
                    })).then(function(flags){
                        var fromMatch=rest.filter(function(_,i){return flags[i];});
                        var cached=byKey.concat(fromMatch);
                        renderWithLocals(cached.length?cached:displayTrainings,namedCacheSet);
                    });
                }).catch(function(){renderWithLocals(displayTrainings);});
            };

            window.refreshHomeGrid();
        }

        function showLoadError(){
            var grid=document.getElementById('trainingsGrid');
            if(grid)grid.innerHTML='<div class="home-status error"><div class="home-status-icon">❌</div><div>加载训练列表失败</div><button onclick="location.reload()" class="home-retry-btn">重试</button></div>';
        }
    })();

            if(lastPage&&lastPageTime){

    // ── PWA 工具函数 ──────────────────────────────────────────────────────

    function getTrainingResources(path,images){
        var r=['./' +path+'/training.json'];
        (images||[]).forEach(function(img){r.push('./'+path+'/'+img);});
        return r;
    }

    function waitForTrainings(timeout){
        return new Promise(function(resolve,reject){
            if(window.__cxTrainings&&window.__cxTrainings.length){resolve(window.__cxTrainings);return;}
            var e=0,iv=setInterval(function(){
                if(window.__cxTrainings&&window.__cxTrainings.length){clearInterval(iv);resolve(window.__cxTrainings);}
                else{e+=100;if(e>=timeout){clearInterval(iv);reject(new Error('超时'));}}
            },100);
        });
    }

    function verifyCacheIntegrity(trainings){
        if(!('caches' in window))return Promise.resolve({ok:false,coverage:0,missingCore:0,missingTrainings:[]});
        var coreUrls=window.__cxCoreUrls||[];
        return caches.keys().then(function(keys){
            var hasCoreCache=keys.some(function(k){return k==='cx-main'||k.indexOf('cx-main-')===0;});
            if(!hasCoreCache)return{ok:false,coverage:0,missingCore:coreUrls.length,missingTrainings:(trainings||[]).map(function(t){return t.path;})};
            var checkUrls=coreUrls.filter(function(u){return u!=='./';}); 
            return caches.open('cx-main').then(function(cache){
                return Promise.all(checkUrls.map(function(u){return cache.match(u).then(function(r){return r?null:u;});}));
            }).then(function(results){
                var missingUrls=results.filter(Boolean);
                var hits=checkUrls.length-missingUrls.length;
                var cov=checkUrls.length>0?hits/checkUrls.length:1;
                if(cov<1)return{ok:false,coverage:cov,missingCore:missingUrls.length,missingCoreUrls:missingUrls,missingTrainings:[]};
                if(!trainings||!trainings.length)return{ok:true,coverage:1,missingCore:0,missingTrainings:[]};
                var missingT=trainings.filter(function(t){return!keys.some(function(k){return k==='cx-'+t.path;});});
                var tCov=(trainings.length-missingT.length)/trainings.length;
                return{ok:tCov>=1,coverage:tCov,missingCore:0,missingTrainings:missingT.map(function(t){return t.path;})};
            });
        }).catch(function(){return{ok:false,coverage:0,missingCore:0,missingTrainings:[]};});
    }

    function cacheAllTrainings(statusEl,onProgress){
        if(!('caches' in window)){if(statusEl)statusEl.textContent='当前环境不支持缓存';return Promise.resolve();}
        var trainings=(window.__cxTrainings||[]).filter(function(t){return!t.is_collection;});
        if(!trainings.length){if(statusEl)statusEl.textContent='训练列表尚未加载';return Promise.resolve();}
        var maxN=window.CX_MAX_LATEST_TRAININGS||trainings.length;trainings=trainings.slice(0,maxN);
        var coreUrls=window.__cxCoreUrls||[];
        var totalResources=coreUrls.length;var cachedResources=0;
        trainings.forEach(function(t){totalResources+=getTrainingResources(t.path,t.images||[]).length;});
        function rep(){var p=totalResources>0?Math.round(cachedResources/totalResources*100):0;if(onProgress)onProgress(p);return p;}
        var cacheShared=caches.open('cx-main').then(function(cache){
            return Promise.allSettled(coreUrls.map(function(url){
                return fetch(url,{cache:'no-cache'}).then(function(r){cachedResources++;if(statusEl)statusEl.textContent='核心资源：'+cachedResources+'/'+coreUrls.length;if(r.ok)return cache.put(url,r.clone());}).catch(function(){cachedResources++;rep();});
            }));
        }).catch(function(){});
        return cacheShared.then(function(){
            return trainings.reduce(function(p,t){return p.then(function(){
                var resources=getTrainingResources(t.path,t.images||[]);
                if(statusEl)statusEl.textContent='缓存：'+t.title;
                return caches.open('cx-'+t.path).then(function(cache){
                    return Promise.all(resources.map(function(url){
                        return fetch(url,{redirect:'follow',cache:'no-cache'}).then(function(r){
                            if(r.ok){cachedResources++;rep();return cache.put(r.url,r.clone());}
                        }).catch(function(){cachedResources++;rep();});
                    }));
                });
            });},Promise.resolve());
        }).then(function(){if(statusEl){statusEl.textContent='✓ 全部缓存完成';statusEl.className='cache-status success';}try{localStorage.setItem('cx_all_cached',Date.now().toString());}catch(e){}});
    }

    function showMandatoryInstallDialog(mode,targetVersion){
        if(document.getElementById('cxInstallMask'))return;
        var icons={install:'📦',update:'🔄'};
        var titles={install:'首次安装缓存',update:'缓存更新中'};
        var maxN_=window.CX_MAX_LATEST_TRAININGS||7;
        var subs={install:'首次使用会缓存最近 '+maxN_+' 个训练，历史训练可在设置面板下载资源包，请保持网络连接...',update:'正在重新缓存最新资源，用户数据不受影响...'};
        var mask=document.createElement('div');mask.id='cxInstallMask';mask.className='cx-install-mask';
        mask.innerHTML='<div class="cx-install-box"><div class="cx-install-icon">'+icons[mode]+'</div><div class="cx-install-title">'+titles[mode]+'</div><div class="cx-install-sub">'+subs[mode]+'</div><div class="cx-install-progress"><div class="cx-install-progress-bar" id="cxInstallProgressBar"></div></div><div class="cx-install-status" id="cxInstallStatus">正在准备...</div><button class="cx-install-retry" id="cxInstallRetry">重试</button></div>';
        mask.addEventListener('click',function(e){e.stopPropagation();});
        document.body.appendChild(mask);
        var statusEl=document.getElementById('cxInstallStatus');
        var progressBar=document.getElementById('cxInstallProgressBar');
        var retryBtn=document.getElementById('cxInstallRetry');
        function doInstall(){
            if(retryBtn)retryBtn.style.display='none';
            if(progressBar)progressBar.style.width='0%';
            if(statusEl)statusEl.textContent='正在等待训练列表...';
            // 先获取训练列表，再按需清理——只清除本次将要重新下载的命名缓存
            // 保留其他已安装的默认训练（命名缓存）和历史包数据（cx-main）
            waitForTrainings(15000).then(function(trainings){
                var toCache=trainings.filter(function(t){return!t.is_collection;}).slice(0,window.CX_MAX_LATEST_TRAININGS||trainings.length);
                var refreshKeys=toCache.map(function(t){return'cx-'+t.path;});
                if(statusEl)statusEl.textContent='正在清理旧缓存...';
                var clearStep=('caches' in window)?caches.keys().then(function(keys){return Promise.all(keys.filter(function(k){return refreshKeys.indexOf(k)!==-1;}).map(function(k){return caches.delete(k);}));}).catch(function(){}):Promise.resolve();
                return clearStep.then(function(){
                    if(statusEl)statusEl.textContent='开始缓存资源...';
                    return cacheAllTrainings(statusEl,function(percent){if(progressBar)progressBar.style.width=Math.min(percent,100)+'%';}).then(function(){
                        if(progressBar)progressBar.style.width='100%';
                        if(statusEl)statusEl.textContent='✓ 下载完成，正在验证...';
                        return verifyCacheIntegrity(toCache);
                    }).then(function(result){
                        if(result.ok){try{localStorage.setItem('cx_pwa_version',targetVersion);}catch(e){}
                            if(statusEl)statusEl.textContent='✅ 缓存完整，即将重载...';
                            if(progressBar)progressBar.style.width='100%';
                            setTimeout(function(){window.location.reload();},1200);
                        }else{
                            var msg='⚠ 部分资源未完整（'+Math.round((result.coverage||0)*100)+'%）';
                            if(result.missingCore&&result.missingCore>0){
                                msg+='\n缺少核心资源 '+result.missingCore+' 个';
                                if(result.missingCoreUrls&&result.missingCoreUrls.length)msg+='：'+result.missingCoreUrls.slice(0,3).map(function(u){return u.split('/').pop();}).join('、')+(result.missingCoreUrls.length>3?'...':'');
                            }
                            if(result.missingTrainings&&result.missingTrainings.length)msg+='\n缺少训练：'+result.missingTrainings.join('、');
                            msg+='\n请重试';
                            if(statusEl){statusEl.textContent=msg;statusEl.style.whiteSpace='pre-line';}
                            if(retryBtn)retryBtn.style.display='block';
                        }
                    });
                });
            }).catch(function(err){if(statusEl)statusEl.textContent='⚠ 出错：'+(err&&err.message||'未知')+'，请重试';if(retryBtn)retryBtn.style.display='block';});
        }
        if(retryBtn)retryBtn.addEventListener('click',doInstall);
        doInstall();
    }

    function checkPwaStartupCache(){
        if(!CX_ENV.isStandalone||CX_ENV.isCapacitorApp||!('caches' in window))return;
        var storedVersion=null;try{storedVersion=localStorage.getItem('cx_pwa_version');}catch(e){}
        fetch('./version.json?t='+Date.now(),{cache:'no-store'})
            .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
            .then(function(v){
                var remoteVersion=v.version||v.apk_version;
                var targetVersion=remoteVersion||storedVersion;
                var versionChanged=remoteVersion&&storedVersion!==remoteVersion;
                if(versionChanged){
                    if(storedVersion){
                        // 已有旧版本，有新版本：弹提示，让用户决定是否更新
                        _showPwaUpdateReady();
                    } else {
                        // 首次安装或清除数据后：强制缓存（无历史数据，必须安装）
                        showMandatoryInstallDialog('install',targetVersion);
                    }
                    return;
                }
                waitForTrainings(5000).then(function(trainings){var n=window.CX_MAX_LATEST_TRAININGS||trainings.length;var converted=trainings.filter(function(t){return!t.is_collection;});return verifyCacheIntegrity(converted.slice(0,n));})
                    .then(function(result){if(!result.ok){var m=storedVersion?'update':'install';showMandatoryInstallDialog(m,targetVersion);}})
                    .catch(function(){});
            })
            .catch(function(err){
                if(!storedVersion){var b=document.getElementById('cxOfflineBanner');if(b){b.classList.add('show');var d=b.querySelector('.cx-banner-dismiss');if(d)d.addEventListener('click',function(){b.classList.remove('show');});}}
            });
    }

    // PWA 更新就绪通知（SW 更新或版本号变化时调用）
    // 使用 toast 横幅提示而非直接弹出更新对话框
    function _showPwaUpdateReady(){
        try{sessionStorage.removeItem('cx_update_toast_shown');}catch(e){}
        if(window.AppUpdate&&window.AppUpdate.silentCheckUpdate){
            window.AppUpdate.silentCheckUpdate();
        } else {
            window.__cxPwaUpdateReady=true;
        }
    }

    // 注册 Service Worker（非 Capacitor 原生环境）
    if('serviceWorker' in navigator){
        var _isNativeApp=!!(window.Capacitor&&window.Capacitor.isNativePlatform&&window.Capacitor.isNativePlatform());
        if(_isNativeApp){
            // Capacitor WebView 不支持 SW，跳过注册
            // APK 所有资源已内置，首次启动在后台静默填充 Cache API，不阻塞用户；
            // 完成后写 cx_pwa_version，后续启动直接跳过。
            if('caches' in window){
                var _capVer=null;try{_capVer=localStorage.getItem('cx_pwa_version');}catch(e){}
                fetch('./version.json?t='+Date.now(),{cache:'no-store'})
                    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
                    .then(function(v){
                        var _ver=v.version||v.apk_version||'';
                        // 版本未变则跳过，避免每次启动都重复填充
                        if(_capVer&&_capVer===_ver)return;
                        waitForTrainings(15000).then(function(){
                            return cacheAllTrainings(null,null);
                        }).then(function(){
                            if(_ver)try{localStorage.setItem('cx_pwa_version',_ver);}catch(e){}
                        }).catch(function(){});
                    })
                    .catch(function(){/* 离线时跳过 */});
            }
        } else {
        navigator.serviceWorker.register('./sw.js').then(function(reg){
            reg.update().catch(function(){});
            reg.addEventListener('updatefound',function(){
                var nw=reg.installing;
                if(nw)nw.addEventListener('statechange',function(){
                    if(nw.state==='installed'&&navigator.serviceWorker.controller)nw.postMessage({type:'SKIP_WAITING'});
                });
            });
            return navigator.serviceWorker.ready;
        }).then(function(){checkPwaStartupCache();}).catch(function(e){console.error('[SW]',e);});
        var refreshing=false;
        navigator.serviceWorker.addEventListener('controllerchange',function(){
            if(refreshing)return;
            var isNative=!!(window.Capacitor&&window.Capacitor.isNativePlatform&&window.Capacitor.isNativePlatform());
            if(isNative)return;
            refreshing=true;window.location.reload();
        });
        } // end else (non-native)
    }

    // 主页 PWA/清理功能委托（供 theme-toggle.js 调用）
    window.CX.clearData=function(){
        if(window.CX&&window.CX.showClearDialog){window.CX.showClearDialog(function(sel){clearAllCachesAndMemory({clearNotesOnly:sel==='notes'});});}
    };

    function clearAllCachesAndMemory(opts){
        opts=opts||{};
        var goHome=function(){
            try{window.history.replaceState(null,'',window.location.pathname);}catch(e){}
            window.location.reload();
        };
        if(opts.clearNotesOnly){
            try{localStorage.removeItem('cx_highlights');}catch(e){}
            try{localStorage.removeItem('cx_highlights_bak');}catch(e){}
            var lf=(typeof localforage!=='undefined')?localforage.createInstance({name:'cx',storeName:'highlights'}):null;
            (lf?lf.clear():Promise.resolve()).then(goHome).catch(goHome);
            return;
        }
        var steps=[];
        steps.push(new Promise(function(resolve){try{var keys=[];for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k&&k.startsWith('cx_')&&k!=='cx_first_use')keys.push(k);else if(k&&k.startsWith('cx-'))keys.push(k);if(k==='fontSize'||k==='globalFontSize'||k==='readingTheme'||k==='speechRate')keys.push(k);}keys.forEach(function(k){localStorage.removeItem(k);});resolve();}catch(e){resolve();}}));
        steps.push(new Promise(function(resolve){try{sessionStorage.clear();resolve();}catch(e){resolve();}}));
        if('serviceWorker' in navigator)steps.push(navigator.serviceWorker.getRegistrations().then(function(regs){return Promise.all(regs.map(function(r){return r.unregister();}));}).catch(function(){}));
        if('caches' in window)steps.push(caches.keys().then(function(keys){return Promise.all(keys.map(function(k){return caches.delete(k);}));}).catch(function(){}));
        if('indexedDB' in window)steps.push(new Promise(function(resolve){try{var dbs=['cx-trainings','cx-cache','workbox-expiration','localforage'];Promise.all(dbs.map(function(n){return new Promise(function(r){var req=indexedDB.deleteDatabase(n);req.onsuccess=req.onerror=req.onblocked=r;});})).then(resolve);}catch(e){resolve();}}));
        if(typeof localforage!=='undefined')steps.push(localforage.clear().catch(function(){}));
        Promise.all(steps).then(goHome);
    }

    // 主页 PWA 安装功能委托（供 theme-toggle.js 调用）
    document.addEventListener('DOMContentLoaded',function(){
        window.CX.installPWA=function(){
            var p=window._pwaInstallPrompt;if(!p)return;
            window._pwaInstallPrompt=null;p.prompt();
        };
    });
    </script>

    <!-- ── 启动 SPA 路由器 ────────────────────────────────────────────── -->
    <script>
    // renderer.js 的 renderHome/renderChapterView 需要知道如何切换视图
    // 在 renderer.js 初始化完成后挂载切换函数
    (function waitRenderer(){
        if(window.CXRenderer){
            // 覆盖 renderHome 以恢复 homeView 并刷新缓存 grid
            var origRenderHome=window.CXRenderer.renderHome;
            window.CXRenderer.renderHome=function(){
                origRenderHome.call(window.CXRenderer);
                // 重新检查缓存，更新主页 grid（用户下载训练后返回主页时触发）
                if(window.refreshHomeGrid)window.refreshHomeGrid();
            };
            // 覆盖 renderChapterView / renderBatchIndex 以切换到 app 视图
            ['renderChapterView','renderBatchIndex'].forEach(function(fn){
                var orig=window.CXRenderer[fn];
                window.CXRenderer[fn]=function(){
                    window._cxShowApp();
                    return orig.apply(window.CXRenderer,arguments);
                };
            });
        }
        if(window.CXRouter){
            window.CXRouter.start();
        } else {
            // 等待 router.js 加载
            document.addEventListener('DOMContentLoaded',function(){
                if(window.CXRouter)window.CXRouter.start();
            });
        }
    })();
    </script>
    <!-- 阅读进度条 JS -->
    <script>
    (function(){
        var prog=document.getElementById('cxReadingProgress');
        if(prog){
            function updProg(){var s=window.scrollY||0;var d=document.documentElement.scrollHeight-window.innerHeight;prog.style.width=(d>0?Math.min(100,s/d*100):0)+'%';}
            window.addEventListener('scroll',updProg,{passive:true});
            window.addEventListener('hashchange',function(){prog.style.width='0%';});
        }
    })();
    </script>
