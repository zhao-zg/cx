        }
        
        .cache-progress {

        .footer {

            padding: 16px;

            background: #f5f7fa;

        @media (max-width: 768px) {

        /* 缓存按钮 */
        .cache-section {

            background: #f8f9fa;
            border-top: 1px solid #e2e8f0;

        }

        .cache-btn {

            gap: 6px;

            font-weight: 600;

        @media (max-width: 480px) {

                font-size: 14px;
            }
            
            .cache-status {
                font-size: 12px;
                padding: 0 8px;
            }
        }
    </style>
</head>

    <script>
    // 自动设置 APK 版本（用于离线版）
    (function() {
        // 检测是否在 Capacitor 环境中
        if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.App) {
            window.Capacitor.Plugins.App.getInfo().then(function(info) {
                if (info.version) {
                    localStorage.setItem('cx_apk_version', info.version);
                    console.log('从 Capacitor 获取版本:', info.version, '包名:', info.id);
                }
            }).catch(function(err) {
                console.log('无法获取 App 信息:', err);
            });
        }
    })();
    
    // APK 检测和更新功能
    (function() {
        var isAndroid = /Android/i.test(navigator.userAgent);
        var isInApp = window.matchMedia('(display-mode: standalone)').matches || 
                      window.navigator.standalone === true;
        
        // 检测是否在 Capacitor WebView 中
        var isCapacitor = window.Capacitor !== undefined;
        
        // 检测 URL scheme（Capacitor 使用 capacitor:// 或 http://localhost）
        var isCapacitorScheme = window.location.protocol === 'capacitor:' || 
                                (window.location.hostname === 'localhost' && window.location.protocol === 'http:');
        
        console.log('APK 检测初始化:', {
            isAndroid: isAndroid,
            isInApp: isInApp,
            isCapacitor: isCapacitor,
            isCapacitorScheme: isCapacitorScheme,
            userAgent: navigator.userAgent,
            displayMode: window.matchMedia('(display-mode: standalone)').matches,
            protocol: window.location.protocol,
            hostname: window.location.hostname
        });
        
        // 如果是安卓设备且在 APP 内（从 APK 打开）
        // 使用多种检测方式：PWA standalone 模式、Capacitor API、或 Capacitor URL scheme
        if (isAndroid && (isInApp || isCapacitor || isCapacitorScheme)) {
            var clickCount = 0;
            var clickTimer = null;
            var logo = document.getElementById('mainLogo');
            
            console.log('APK 更新检查已启用，点击 Logo 5 次触发');
            
            if (logo) {
                logo.addEventListener('click', function() {
                    clickCount++;
                    console.log('Logo 点击:', clickCount, '/5');
                    
                    if (clickTimer) clearTimeout(clickTimer);
                    clickTimer = setTimeout(function() {
                        console.log('点击计数重置');
                        clickCount = 0;
                    }, 5000);
                    
                    // 点击 5 次触发 APK 更新检查（降低门槛）
                    if (clickCount >= 5) {
                        clickCount = 0;
                        if (clickTimer) clearTimeout(clickTimer);
                        console.log('=== 触发 APK 更新检查 ===');
                        checkApkUpdate();
                    }
                });
            } else {
                console.error('找不到 mainLogo 元素');
            }
        } else {
            console.log('APK 更新检查未启用（非安卓 APP 环境）');
        }
        
        // 获取当前 APK 版本（异步）
        function getCurrentApkVersion() {
            return new Promise(function(resolve) {
                // 先尝试从 localStorage 获取
                var cachedVersion = localStorage.getItem('cx_apk_version');
                
                // 如果在 Capacitor 环境中，尝试实时获取
                if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.App) {
                    window.Capacitor.Plugins.App.getInfo().then(function(info) {
                        if (info.version) {
                            localStorage.setItem('cx_apk_version', info.version);
                            console.log('从 Capacitor 实时获取版本:', info.version, '包名:', info.id);
                            resolve(info.version);
                        } else {
                            console.log('Capacitor 未返回版本号，使用缓存:', cachedVersion || '未知');
                            resolve(cachedVersion || '未知');
                        }
                    }).catch(function(err) {
                        console.log('获取 Capacitor 版本失败:', err, '使用缓存:', cachedVersion || '未知');
                        resolve(cachedVersion || '未知');
                    });
                } else {
                    // 非 Capacitor 环境，直接返回缓存
                    console.log('非 Capacitor 环境，当前版本:', cachedVersion || '未知');
                    resolve(cachedVersion || '未知');
                }
            });
        }
        
        // 比较版本号
        // 返回值：1 = v1 > v2, -1 = v1 < v2, 0 = v1 == v2, null = 无法比较（版本未知）
        function compareVersion(v1, v2) {
            if (v1 === '未知' || v2 === '未知') return null;
            
            var parts1 = v1.replace('v', '').split('.').map(Number);
            var parts2 = v2.replace('v', '').split('.').map(Number);
            
            for (var i = 0; i < Math.max(parts1.length, parts2.length); i++) {
                var p1 = parts1[i] || 0;
                var p2 = parts2[i] || 0;
                if (p1 > p2) return 1;
                if (p1 < p2) return -1;
            }
            return 0;
        }
        
        // 检查 APK 更新
        function checkApkUpdate() {
            console.log('开始检查 APK 更新...');
            
            // 异步获取当前版本
            getCurrentApkVersion().then(function(currentVersion) {
                console.log('当前版本:', currentVersion);
                
                return fetch('https://api.github.com/repos/zhao-zg/cx/releases/latest')
                    .then(function(response) {
                        console.log('GitHub API 响应状态:', response.status);
                        if (!response.ok) throw new Error('无法获取版本信息: ' + response.status);
                        return response.json();
                    })
                    .then(function(release) {
                        console.log('获取到 Release 信息:', {
                            tag: release.tag_name,
                            assetsCount: release.assets.length
                        });
                        
                        // 查找离线版 APK 文件
                        var apk = release.assets.find(function(a) {
                            return a.name.endsWith('.apk');
                        });
                        
                        if (!apk) {
                            console.warn('未找到 APK 文件');
                            alert('未找到可用的 APK 文件');
                            return;
                        }
                        
                        // 比较版本
                        var latestVersion = release.tag_name.replace('v', '');
                        var currentVersionClean = currentVersion.replace('v', '');
                        var comparison = compareVersion(latestVersion, currentVersionClean);
                        
                        console.log('版本比较:', {
                            current: currentVersion,
                            latest: latestVersion,
                            comparison: comparison
                        });
                        
                        // 显示更新对话框
                        showApkUpdateDialog(release, apk, currentVersion, comparison);
                    });
            }).catch(function(error) {
                console.error('检查更新失败:', error);
                alert('检查更新失败: ' + error.message);
            });
        }
        
        // 下载 APK（使用系统浏览器或 Capacitor Browser）
        window.downloadApk = async function(url) {
            console.log('开始下载 APK:', url);
            
            try {
                // 检查是否在 Capacitor 环境中
                if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.Browser) {
                    console.log('使用 Capacitor Browser 打开下载链接');
                    await window.Capacitor.Plugins.Browser.open({ url: url });
                } else {
                    console.log('使用 window.open 打开下载链接');
                    // 后备方案：使用 window.open
                    var link = document.createElement('a');
                    link.href = url;
                    link.target = '_blank';
                    link.download = '';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                }
            } catch (error) {
                console.error('下载失败:', error);
                // 最后的后备方案
                window.open(url, '_blank');
            }
        };
        
        // 显示 APK 更新对话框
        function showApkUpdateDialog(release, apk, currentVersion, comparison) {
            var latestVersion = release.tag_name;
            var isVersionUnknown = (currentVersion === '未知');
            
            var html = '<div style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px;" id="apkUpdateDialog">';
            html += '<div style="background: white; border-radius: 12px; padding: 24px; max-width: 400px; width: 100%; max-height: 80vh; overflow-y: auto;">';
            
            // 标题根据版本情况变化
            if (isVersionUnknown) {
                html += '<h3 style="color: #667eea; margin-bottom: 15px; font-size: 20px;">📱 APK 下载</h3>';
            } else if (comparison > 0) {
                html += '<h3 style="color: #667eea; margin-bottom: 15px; font-size: 20px;">🎉 发现新版本</h3>';
            } else if (comparison === 0) {
                html += '<h3 style="color: #48bb78; margin-bottom: 15px; font-size: 20px;">✅ 已是最新版本</h3>';
            } else {
                html += '<h3 style="color: #667eea; margin-bottom: 15px; font-size: 20px;">📱 版本信息</h3>';
            }
            
            html += '<div style="color: #333; margin-bottom: 20px; font-size: 14px; line-height: 1.6;">';
            html += '<p style="margin-bottom: 10px;">';
            html += '<strong>当前版本：</strong>' + (isVersionUnknown ? '未知' : 'v' + currentVersion) + '<br>';
            html += '<strong>最新版本：</strong>' + latestVersion;
            html += '</p>';
            
            // 显示版本状态提示
            if (isVersionUnknown) {
                html += '<div style="background: #fff3cd; padding: 10px; border-radius: 8px; font-size: 13px; text-align: center; color: #856404; margin-bottom: 15px;">';
                html += '⚠️ 无法获取当前版本号<br>建议下载最新版本';
                html += '</div>';
            } else if (comparison === 0) {
                html += '<div style="background: #e6f7ed; padding: 10px; border-radius: 8px; font-size: 13px; text-align: center; color: #48bb78; margin-bottom: 15px;">';
                html += '✨ 您使用的已经是最新版本';
                html += '</div>';
            } else if (comparison > 0) {
                html += '<div style="background: #fff3cd; padding: 10px; border-radius: 8px; font-size: 13px; text-align: center; color: #856404; margin-bottom: 15px;">';
                html += '🎉 发现新版本可更新';
                html += '</div>';
            } else if (comparison < 0) {

    // 防乱码重定向 - 检测并修复双重编码的 URL
    (function() {
        try {
            var currentPath = window.location.pathname;
            
            // 检测是否包含双重编码的特征
            // 双重编码的 UTF-8 会包含 %C3%A 或 %C2% 等模式
            var hasDoubleEncoding = /%C3%[89AB]|%C2%[89AB]/.test(currentPath);
            
            if (hasDoubleEncoding) {
                console.log('[防乱码] 检测到双重编码的 URL:', currentPath);
                
                try {
                    // 第一次解码：%C3%A7%C2%A7%C2%8B... → Ã§Â§Â...
                    var firstDecode = decodeURIComponent(currentPath);
                    console.log('[防乱码] 第一次解码:', firstDecode);
                    
                    // 将字符串转换为字节数组
                    var bytes = [];
                    for (var i = 0; i < firstDecode.length; i++) {
                        bytes.push(firstDecode.charCodeAt(i) & 0xFF);
                    }
                    
                    // 将字节数组转换为 UTF-8 字符串
                    var utf8Bytes = new Uint8Array(bytes);
                    var decoder = new TextDecoder('utf-8');
                    var correctPath = decoder.decode(utf8Bytes);
                    
                    console.log('[防乱码] 正确的路径:', correctPath);
                    
                    // 重定向到正确的 URL
                    var correctUrl = window.location.origin + correctPath + window.location.search + window.location.hash;
                    console.log('[防乱码] 重定向到:', correctUrl);
                    
                    window.location.replace(correctUrl);
                    return;
                } catch (e) {
                    console.error('[防乱码] 解码失败:', e);
                    
                    // 如果解码失败，尝试简单的双重解码
                    try {
                        var doubleDecode = decodeURIComponent(decodeURIComponent(currentPath));
                        console.log('[防乱码] 双重解码:', doubleDecode);
                        
                        if (doubleDecode !== currentPath) {
                            var correctUrl = window.location.origin + doubleDecode + window.location.search + window.location.hash;
                            console.log('[防乱码] 重定向到:', correctUrl);
                            window.location.replace(correctUrl);
                            return;
                        }
                    } catch (e2) {
                        console.error('[防乱码] 双重解码也失败:', e2);
                    }
                    
                    // 如果都失败，回到主页
                    if (currentPath !== '/' && currentPath !== '/index.html') {
                        console.log('[防乱码] 回到主页');
                        window.location.replace('/');
                        return;
                    }
                }
            }
        } catch (e) {
            console.error('[防乱码] 错误:', e);
        }
    })();

    (function() {

                return; // 非 APP 模式不启用记忆功能
            }
            
            var lastPage = localStorage.getItem('cx_last_page');
            var lastPageTime = localStorage.getItem('cx_last_page_time');
            
            console.log('[页面记忆] 上次访问:', lastPage, '时间:', lastPageTime);
            
            // 如果有保存的页面，且在7天内访问过，则恢复
            if (lastPage && lastPageTime) {
                var timeDiff = Date.now() - parseInt(lastPageTime);
                var days7 = 7 * 24 * 60 * 60 * 1000;
                
                if (timeDiff < days7) {
                    // 检查是否是从外部链接进入（没有 referrer 或 referrer 不是本站）
                    var isExternalEntry = !document.referrer || !document.referrer.startsWith(window.location.origin);

                        isExternalEntry: isExternalEntry,
                        isMainPage: isMainPage,
                        referrer: document.referrer,
                        pathname: window.location.pathname
                    });
                    
                    // 只在外部进入主页时恢复（避免用户主动点击主页时也跳转）
                    if (isExternalEntry && isMainPage) {

            installBtn.style.display = 'inline-flex';
            installBtn.innerHTML = '<span class="cache-icon">📲</span><span class="cache-text">添加到主屏幕</span>';
            installBtn.addEventListener('click', function() {
                installStatus.innerHTML = '请点击浏览器底部 <strong>分享按钮 ↑</strong>，然后选择 <strong>"添加到主屏幕"</strong>';
                installStatus.className = 'cache-status';
            });
        } else if (installBtn) {
            installBtn.addEventListener('click', function() {
                if (deferredPrompt) {
                    installStatus.textContent = '正在准备安装...';
                    installStatus.className = 'cache-status';
                    
                    deferredPrompt.prompt();
                    deferredPrompt.userChoice.then(function(result) {
                        if (result.outcome === 'accepted') {
                            installStatus.textContent = '✓ 安装成功！PWA 已添加到主屏幕';
                            installStatus.className = 'cache-status success';
                            
                            // 等待 Service Worker 就绪
                            if ('serviceWorker' in navigator) {
                                navigator.serviceWorker.ready.then(function() {
                                    installStatus.textContent = '✓ 安装完成！离线功能已启用';
                                });
                            }
                            
                            setTimeout(function() {
                                installBtn.style.display = 'none';
                            }, 3000);
                        } else {
                            installStatus.textContent = '';
                        }
                        deferredPrompt = null;
                    });
                }
            });
        }
        
        // 清理所有缓存和记忆功能（通过点击 Logo 5 次触发）
        var clearClickCount = 0;
        var clearClickTimer = null;
        var logo = document.getElementById('mainLogo');
        
        if (logo) {
            logo.addEventListener('click', function(e) {
                // 如果已经有 APK 更新检查的点击计数器，不干扰
                clearClickCount++;
                
                if (clearClickTimer) clearTimeout(clearClickTimer);
                clearClickTimer = setTimeout(function() {
                    clearClickCount = 0;
                }, 3000);
                
                // 点击 5 次触发清理所有缓存和记忆
                if (clearClickCount >= 5) {
                    clearClickCount = 0;
                    if (clearClickTimer) clearTimeout(clearClickTimer);
                    
                    if (confirm('确定要清理所有缓存和记忆吗？\n\n这将删除：\n• 所有训练的离线缓存\n• 页面记忆\n• 字体大小设置\n• 语速设置\n\n清理后需要重新缓存训练内容。')) {
                        clearAllCachesAndMemory();
                    }
                }
            });
        }
        
        // 清理所有缓存和记忆的函数
        function clearAllCachesAndMemory() {
            console.log('[清理] 开始清理所有缓存和记忆');
            
            var installStatus = document.getElementById('installStatus');
            if (installStatus) {
                installStatus.textContent = '正在清理所有缓存和记忆...';
                installStatus.className = 'cache-status';
            }
            
            // 1. 清理 localStorage（页面记忆、字体设置、语速设置等）
            try {
                var keysToRemove = [];
                for (var i = 0; i < localStorage.length; i++) {
                    var key = localStorage.key(i);
                    // 清理所有 cx_ 开头的键
                    if (key && key.startsWith('cx_')) {
                        keysToRemove.push(key);
                    }
                    // 清理字体和语速设置
                    if (key === 'fontSize' || key === 'speechRate') {
                        keysToRemove.push(key);
                    }
                }
                keysToRemove.forEach(function(key) {
                    localStorage.removeItem(key);
                    console.log('[清理] 删除 localStorage:', key);
                });
            } catch (e) {
                console.error('[清理] 清理 localStorage 失败:', e);
            }
            
            // 2. 注销所有 Service Worker
            var unregisterPromise = Promise.resolve();
            if ('serviceWorker' in navigator) {
                unregisterPromise = navigator.serviceWorker.getRegistrations().then(function(registrations) {
                    console.log('[清理] 找到 Service Worker:', registrations.length, '个');
                    return Promise.all(
                        registrations.map(function(registration) {
                            console.log('[清理] 注销 Service Worker:', registration.scope);
                            return registration.unregister();
                        })
                    );
                });
            }
            
            // 3. 清理所有 Cache Storage
            unregisterPromise.then(function() {
                if ('caches' in window) {
                    return caches.keys().then(function(keys) {
                        console.log('[清理] 找到缓存:', keys);
                        return Promise.all(
                            keys.map(function(key) {
                                console.log('[清理] 删除缓存:', key);
                                return caches.delete(key);
                            })
                        );
                    });
                }
                return Promise.resolve();
            }).then(function() {
                console.log('[清理] 所有缓存和 Service Worker 已清理');
                
                if (installStatus) {
                    installStatus.textContent = '✓ 清理完成！页面将在 3 秒后刷新';
                    installStatus.className = 'cache-status success';
                }
                
                // 4. 刷新页面
                setTimeout(function() {
                    window.location.reload(true);
                }, 3000);
            }).catch(function(err) {
                console.error('[清理] 清理失败:', err);
                if (installStatus) {
                    installStatus.textContent = '✗ 清理失败: ' + err.message;
                    installStatus.className = 'cache-status error';
                }
            });
            
            if (!('caches' in window) && !('serviceWorker' in navigator)) {
                console.log('[清理] 浏览器不支持 Cache Storage');
                if (installStatus) {
                    installStatus.textContent = '✓ localStorage 已清理，页面将在 3 秒后刷新';
                    installStatus.className = 'cache-status success';
                }
                setTimeout(function() {
                    window.location.reload(true);
                }, 3000);
            }
        }
    });
    </script>
</body>
</html>
