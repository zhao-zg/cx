<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="特会信息合集 - 所有训练总览">
    <meta name="theme-color" content="#f0f3f9">
    <!-- 防止主题跳色：在渲染前设置主题 -->
    <script>(function(){var d=document.documentElement,m=document.querySelector('meta[name="theme-color"]'),s=null,t='cool';try{s=localStorage.getItem('readingTheme')}catch(e){}if(s==='cool'||s==='warm'||s==='dark'){t=s}else{try{t=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'cool'}catch(e){t='cool'}}d.setAttribute('data-theme',t);if(m){m.setAttribute('content',t==='warm'?'#f3ede4':(t==='dark'?'#101319':'#f0f3f9'));}})();</script>
    <!-- 伪装检测：非PWA/非APP浏览器提示（暂用弹框，后续恢复伪装页） -->
    <!-- isCap: Capacitor 6+ Android 默认 https://localhost，去掉 http 协议限制 -->
    <script>(function(){var ok=false;try{if(sessionStorage.getItem('cx_access')==='ok')ok=true;}catch(e){}if(!ok&&window.location.search.indexOf('zzg')!==-1){try{sessionStorage.setItem('cx_access','ok');}catch(e){}ok=true;}if(!ok){var isCap=window.Capacitor!==undefined||window.location.protocol==='capacitor:'||window.location.hostname==='localhost';var isPwa=window.navigator.standalone===true||(window.matchMedia&&window.matchMedia('(display-mode: standalone)').matches);if(!isCap&&!isPwa)document.documentElement.classList.add('cx-disguise'); }})();</script>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
    <link rel="apple-touch-icon" sizes="167x167" href="icons/icon-167.png">
    <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
    <link rel="apple-touch-icon" sizes="120x120" href="icons/icon-120.png">
    <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="icons/icon-16.png">
    <!-- 预加载关键资源 -->
    <link rel="preload" href="trainings.json" as="fetch" crossorigin>
    <title>特会信息合集</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 首页特有覆盖 */
        body{padding-bottom:16px}
        .container{padding:0;overflow:hidden}
        .header{color:var(--header-text);margin-bottom:20px}
        .content{padding:0}
        @media(min-width:768px){.header{margin-bottom:30px}}
        /* 训练卡片列表 */
        .trainings-grid{display:flex;flex-direction:column;gap:1px;margin:0;background:var(--group-divider-bg);overflow:hidden;border-radius:12px}
        .training-card{background:var(--surface);overflow:hidden;transition:background-color .2s}
        .training-card:hover{background:var(--nav-hover)}
        .training-card:last-child{border-bottom:none}
        .training-card-wrapper{display:flex;align-items:stretch;gap:0}
        .training-link{display:block;padding:14px 16px;text-decoration:none;color:inherit;flex:1;min-width:0;transition:background-color .2s}
        .training-link:active{background:var(--nav-hover)}
        .training-info{position:relative}
        .training-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;gap:8px}
        /* 骨架屏 */
        .skeleton-item{padding:16px;border-bottom:1px solid var(--border)}
        .skeleton-line{height:18px;background:linear-gradient(90deg,var(--surface-alt) 25%,var(--muted) 50%,var(--surface-alt) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:4px;margin-bottom:8px}
        .skeleton-line.short{width:30%;height:14px}
        @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
        .training-card .year-season{font-size:17px;color:var(--brand);font-weight:600;flex-shrink:0;line-height:1.3}
        .training-card .info{color:var(--text-muted);font-size:16px;white-space:nowrap;flex-shrink:0}
        .training-title-row{display:flex;align-items:center;gap:6px;margin-bottom:0}
        .training-card .title{font-size:1.05em;color:var(--text);line-height:1.6;font-weight:500;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;border-radius:4px;cursor:pointer;min-height:32px;flex:1}
        .training-title-row .arrow{margin-left:auto;color:var(--text-muted);font-weight:600;flex-shrink:0}
        .logo-trigger{cursor:pointer;user-select:none}
        .footer-meta{margin-top:10px;font-size:.9em}
        .home-status{padding:40px 20px;text-align:center;background:var(--surface);color:var(--text-muted)}
        .home-status.error{color:var(--danger-text)}
        .home-status-icon{font-size:24px;margin-bottom:10px}
        .home-retry-btn{margin-top:20px;padding:10px 20px;background:var(--btn-primary-bg);color:var(--btn-primary-text);border:1px solid var(--btn-primary-border);border-radius:6px;cursor:pointer;font:inherit;font-weight:600;box-shadow:var(--shadow-sm)}
        .home-retry-btn:active{transform:scale(.98)}
        .footer{text-align:center;padding:16px;color:var(--text-muted);background:var(--surface-alt);border-top:1px solid var(--border)}
        /* 缓存区 */
        .cache-section{padding:12px;text-align:center;background:var(--surface-alt);border-top:1px solid var(--border);display:none}
        .cache-section.show{display:block}
        #dataToolsSection.show{display:flex;justify-content:center;flex-wrap:wrap;gap:8px}
        #dataToolsStatus{flex-basis:100%}
        /* 清除数据对话框 */
        .cx-dialog-mask{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--overlay-strong);z-index:1100;display:flex;align-items:center;justify-content:center;padding:20px}
        .cx-dialog{background:var(--surface);border-radius:14px;width:min(320px,calc(100vw - 40px));box-shadow:var(--dialog-shadow);overflow:hidden}
        .cx-dialog-title{font-size:15px;font-weight:600;color:var(--heading);padding:16px 16px 0;text-align:center}
        .cx-dialog-desc{font-size:12px;color:var(--text-muted);padding:4px 16px 12px;text-align:center;line-height:1.6}
        .cx-dialog-opts{display:flex;flex-direction:column;gap:8px;padding:0 16px 14px}
        .cx-dialog-opt{display:flex;align-items:flex-start;gap:11px;padding:11px 12px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;background:var(--surface-alt);transition:border-color .15s,background .15s;-webkit-tap-highlight-color:transparent}
        .cx-dialog-opt.selected{border-color:var(--brand);background:var(--interactive-soft-bg)}
        .cx-dialog-opt-icon{font-size:20px;flex-shrink:0;margin-top:1px}
        .cx-dialog-opt-body{flex:1}
        .cx-dialog-opt-title{font-size:13px;font-weight:600;color:var(--heading);margin-bottom:2px}
        .cx-dialog-opt-sub{font-size:11px;color:var(--text-muted);line-height:1.5}
        .cx-dialog-actions{display:flex;border-top:1px solid var(--border)}
        .cx-dialog-cancel{flex:1;padding:13px;background:none;border:none;font-size:14px;color:var(--text-muted);cursor:pointer;border-right:1px solid var(--border)}
        .cx-dialog-confirm{flex:1;padding:13px;background:none;border:none;font-size:14px;font-weight:600;color:var(--danger-text);cursor:pointer}
        .cx-dialog-confirm:active,.cx-dialog-cancel:active{background:var(--surface-alt)}
        .cache-status{margin-top:6px;font-size:12px;color:var(--text-muted);text-align:center;min-height:14px;padding:0}
        .cache-status.success{color:var(--success-text)}
        .cache-status.error{color:var(--danger-text)}
        .cache-status.warning{color:var(--warning-text)}
        /* === 伪装页：非PWA浏览器 === */
        html.cx-disguise .container,html.cx-disguise .footer{display:none!important}
        #cxMaintenance{display:none;position:fixed;inset:0;z-index:9999;background:var(--surface,#fff);flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;box-sizing:border-box}
        html.cx-disguise #cxMaintenance{display:flex}
        .cx-maint-icon{font-size:64px;margin-bottom:24px;cursor:default;-webkit-tap-highlight-color:transparent;user-select:none}
        .cx-maint-title{font-size:20px;font-weight:600;color:var(--text,#333);margin-bottom:12px}
        .cx-maint-sub{font-size:14px;color:var(--text-muted,#999);text-align:center;line-height:1.7;max-width:280px}
        /* === PWA 强制安装/更新/修复遮罩 === */
        .cx-install-mask{display:flex;position:fixed;inset:0;z-index:9500;background:rgba(0,0,0,.72);align-items:center;justify-content:center;padding:20px;box-sizing:border-box}
        .cx-install-box{background:var(--surface,#fff);border-radius:16px;width:min(320px,calc(100vw - 40px));box-shadow:0 8px 40px rgba(0,0,0,.35);overflow:hidden;text-align:center;padding:28px 24px 22px}
        .cx-install-icon{font-size:44px;margin-bottom:10px}
        .cx-install-title{font-size:17px;font-weight:700;color:var(--heading,#111);margin-bottom:6px}
        .cx-install-sub{font-size:12px;color:var(--text-muted,#888);margin-bottom:18px;line-height:1.65}
        .cx-install-progress{height:4px;background:var(--border,#e0e0e0);border-radius:2px;margin-bottom:14px;overflow:hidden}
        .cx-install-progress-bar{height:100%;background:var(--brand,#007aff);border-radius:2px;width:0%;transition:width .3s ease}
        .cx-install-status{font-size:12px;color:var(--text-muted,#666);min-height:16px;margin-bottom:14px;line-height:1.5}
        .cx-install-retry{display:none;padding:9px 22px;background:var(--brand,#007aff);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
        /* === PWA 离线提示横幅 === */
        #cxOfflineBanner{display:none;position:fixed;top:0;left:0;right:0;z-index:8000;background:#e65100;color:#fff;padding:11px 16px;font-size:13px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.2);line-height:1.5}
        #cxOfflineBanner.show{display:block}
        #cxOfflineBanner .cx-banner-dismiss{background:rgba(255,255,255,.25);border:none;color:#fff;padding:3px 10px;border-radius:4px;margin-left:8px;font-size:12px;cursor:pointer;vertical-align:middle;-webkit-tap-highlight-color:transparent}
    </style>
</head>
<body>
    <!-- 伪装维护页（非 PWA/APP 浏览器中显示，PWA 安装后自动隐藏） -->
    <div id="cxMaintenance">
        <div class="cx-maint-icon" id="cxMaintTrigger">📱</div>
        <div class="cx-maint-title" id="cxMaintTitle"></div>
        <div class="cx-maint-sub" id="cxMaintSub"></div>
    </div>
    <script>(function(){
        var isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream;
        var icon=document.getElementById('cxMaintTrigger');
        var title=document.getElementById('cxMaintTitle');
        var sub=document.getElementById('cxMaintSub');
        if(isIOS){
            if(icon)icon.textContent='📲';
            if(title)title.textContent='添加到主屏幕';
            if(sub)sub.textContent='请发送到桌面缓存使用，在线版已不支持，请谅解';
        }else{
            if(icon)icon.textContent='📦';
            if(title)title.textContent='请下载 APK 离线使用';
            if(sub)sub.textContent='请下载APK离线使用，在线版已不支持，请谅解';
        }
        // 彩蛋：点击图标20次可绕过伪装
        var cnt=0,t=0;
        if(icon)icon.addEventListener('click',function(){clearTimeout(t);cnt++;if(cnt>=20){try{sessionStorage.setItem('cx_access','ok');}catch(e){}location.reload();}else{t=setTimeout(function(){cnt=0;},999);}});
    })();</script>
    <!-- PWA 离线提示横幅（standalone 模式下无网且从未缓存时显示） -->
    <div id="cxOfflineBanner">
        📶 需要网络连接才能首次安装缓存
        <button class="cx-banner-dismiss">知道了</button>
    </div>
    <div class="container">
        <div class="header">
            <h1 id="mainLogo" class="logo-trigger">🏠 特会信息合集</h1>
            <p class="subtitle">Conference Information Collections</p>
            <button type="button" id="cx-search-btn" style="margin-top:10px;padding:7px 18px;background:var(--surface-alt);color:var(--brand);border:1.5px solid var(--border);border-radius:20px;font:inherit;font-size:14px;cursor:pointer;-webkit-tap-highlight-color:transparent">🔍 搜索内容</button>
        </div>
        
        <div class="content">
            <div class="trainings-grid" id="trainingsGrid">
                <!-- 骨架屏 - 加载时显示 -->
                <div class="skeleton-item"><div class="skeleton-line" style="width:60%"></div><div class="skeleton-line short"></div></div>
                <div class="skeleton-item"><div class="skeleton-line" style="width:70%"></div><div class="skeleton-line short"></div></div>
                <div class="skeleton-item"><div class="skeleton-line" style="width:55%"></div><div class="skeleton-line short"></div></div>
            </div>
        </div>
        
        <div class="footer">
            <p>本站内容仅供主恢复圣徒交通使用</p>
            <p class="footer-meta">
                生成时间: {{ generation_time }}
            </p>
        </div>
    </div>
    
    <!-- 主题切换脚本 -->
    <script src="js/image-utils.js"></script>
    <script src="js/remote-config.js"></script>
    <script src="js/theme-toggle.js"></script>
    <script src="js/search.js"></script>
    
    <!-- JSZip 库用于解压更新包 -->
    <script src="vendor/jszip.min.js"></script>
    
    <!-- APK 更新功能模块（仅在 Capacitor APP 环境下加载） -->
    <script>
    (function() {
        // 检测是否在 Capacitor 环境中（Capacitor 6+ Android 默认 https://localhost）
        var isCapacitor = window.Capacitor !== undefined;
        var isCapacitorScheme = window.location.protocol === 'capacitor:' || 
                                window.location.hostname === 'localhost';
        
        // 在 Capacitor APP 或 PWA standalone 环境下加载 app-update.js
        var isPwaStandalone = window.matchMedia && window.matchMedia('(display-mode: standalone)').matches || !!navigator.standalone;
        if (isCapacitor || isCapacitorScheme || isPwaStandalone) {
            var script = document.createElement('script');
            script.src = 'js/app-update.js';
            document.head.appendChild(script);
        }
    })();
    </script>
    <script src="js/nav-stack.js"></script>
    
    <script>
    // 自动扫描的训练资源列表
    window.__cxTrainingPages = {{ training_pages | tojson }};
    // 自动扫描的核心资源列表（js/ css/ data/ icons/ vendor/ 等）
    window.__cxCoreUrls = {{ core_urls | tojson }};
    
    // 统一的环境检测 - 避免重复代码
    window.CX = window.CX || {};
    window.CX_ROOT = './';

    var CX_ENV = (function() {
        return {
            isAndroid: /Android/i.test(navigator.userAgent),
            isIOS: /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream,
            isCapacitor: window.Capacitor !== undefined,
            isCapacitorScheme: window.location.protocol === 'capacitor:' || 
                              window.location.hostname === 'localhost',
            isStandalone: window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches,
            get isInApp() {
                return this.isStandalone;
            },
            get isCapacitorApp() {
                return this.isCapacitor || this.isCapacitorScheme;
            }
        };
    })();
    
    // 自动设置 APK 版本（用于离线版）
    // 注意：initHomePage 已移至页面记忆代码块中，确保在判断是否跳转之后再初始化
    (function() {
        var isCapacitor = window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.App;
        if (isCapacitor) {
            window.Capacitor.Plugins.App.getInfo().then(function(info) {
                if (info.version) {
                    localStorage.setItem('cx_apk_version', info.version);
                    console.log('从 Capacitor 获取版本:', info.version, '包名:', info.id);
                }
            }).catch(function(err) {
                console.log('无法获取 App 信息:', err);
            });
        }
    })();
    
    // 显示设置面板操作区
    function showSettingsActions() {
        var s = document.getElementById('settingsActionsSection');
        if (s) s.style.display = 'block';
    }

    // 动态加载训练列表
    (function() {
        console.log('[训练列表] 开始加载');
        
        // 从 APK 内置加载
        loadTrainingsFromBundle();
        
        // 从 APK 内置加载
        function loadTrainingsFromBundle() {
            console.log('[训练列表] 从 APK 内置加载');
            return fetch('trainings.json?t=' + Date.now())
                .then(function(response) {
                    if (!response.ok) throw new Error('HTTP ' + response.status);
                    return response.json();
                })
                .then(function(data) {
                    console.log('[训练列表] APK 内置版本:', data.version);
                    renderTrainings(data);
                })
                .catch(function(error) {
                    console.error('[训练列表] APK 内置加载失败:', error);
                    showLoadError();
                });
        }
        
        // 渲染训练列表
        function renderTrainings(data) {
            var grid = document.getElementById('trainingsGrid');
            if (!grid) return;
            
            var trainings = data.trainings || [];
            window.__cxTrainings = trainings;
            if (trainings.length === 0) {
                grid.innerHTML = '<div class="home-status">暂无训练内容</div>';
                return;
            }
            
            var html = '';
            trainings.forEach(function(training) {
                html += '<div class="training-card">';
                html += '<div class="training-card-wrapper">';
                html += '<a href="' + training.path + '/index.html" class="training-link">';
                html += '<div class="training-info">';
                html += '<div class="training-header">';
                html += '<div class="year-season">' + training.year + '-' + training.season.split(' ')[0] + '</div>';
                html += '<div class="info">共 ' + training.chapter_count + ' 篇</div>';
                html += '</div>';
                html += '<div class="training-title-row">';
                html += '<div class="title">' + training.season.split(' ')[1]  + '</div>';
                html += '<span class="arrow">→</span>';
                html += '</div>';
                html += '</div>';
                html += '</a>';
                html += '</div>';
                html += '</div>';
            });
            
            grid.innerHTML = html;
            
            // PWA 模式下仅显示数据工具区
            var isStandalone = window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches;
            if (isStandalone) {
                var cacheAllBtnEl = document.getElementById('cacheAllBtn');
                if (cacheAllBtnEl) cacheAllBtnEl.style.display = 'inline-flex';
            }
        }
        
        // 显示加载错误
        function showLoadError() {
            var grid = document.getElementById('trainingsGrid');
            if (!grid) return;

            grid.innerHTML = '<div class="home-status error">';
            grid.innerHTML += '<div class="home-status-icon">❌</div>';
            grid.innerHTML += '<div>加载训练列表失败</div>';
            grid.innerHTML += '<button onclick="location.reload()" class="home-retry-btn">重试</button>';
            grid.innerHTML += '</div>';
        }
    })();
    
    // APK 检测和更新功能
    (function() {
        console.log('APK 检测初始化:', {
            isAndroid: CX_ENV.isAndroid,
            isInApp: CX_ENV.isInApp,
            isCapacitor: CX_ENV.isCapacitor,
            isCapacitorScheme: CX_ENV.isCapacitorScheme,
            userAgent: navigator.userAgent,
            protocol: window.location.protocol,
            hostname: window.location.hostname
        });
        
        // 检查更新按钮只在 Capacitor APK 环境显示（由 theme-toggle.js 的 initSettingsActions 处理）
        if (CX_ENV.isAndroid && CX_ENV.isCapacitorApp) {
            // 隐藏入口：点击 Logo 8 次 + 密码验证（用于 GitHub Release 下载）
            var clickCount = 0;
            var clickTimer = null;
            var logo = document.getElementById('mainLogo');
            
            console.log('APK 更新检查已启用，点击 Logo 8 次触发隐藏入口');
            
            if (logo) {
                logo.addEventListener('click', function() {
                    clickCount++;
                    console.log('Logo 点击:', clickCount, '/8');
                    
                    if (clickTimer) clearTimeout(clickTimer);
                    clickTimer = setTimeout(function() {
                        console.log('点击计数重置');
                        clickCount = 0;
                    }, 5000);
                    
                    // 点击 8 次触发密码验证
                    if (clickCount >= 8) {
                        clickCount = 0;
                        if (clickTimer) clearTimeout(clickTimer);
                        console.log('=== 触发密码验证 ===');
                        
                        // 弹出密码输入框
                        var password = prompt('请输入管理密码：');
                        if (password === '1189') {
                            console.log('密码正确，显示更新检查');
                            // 调用 AppUpdate 模块的 GitHub 更新检查对话框
                            if (window.AppUpdate && window.AppUpdate.showGitHubUpdateDialog) {
                                window.AppUpdate.showGitHubUpdateDialog();
                            } else {
                                console.error('AppUpdate 模块未加载或方法不可用');
                                alert('更新功能未加载');
                            }
                        } else if (password !== null) {
                            alert('密码错误');
                        }
                    }
                });
            } else {
                console.error('找不到 mainLogo 元素');
            }
        } else {
            console.log('APK 更新检查未启用（非安卓 APP 环境）');
        }
    })();
    
    // 页面记忆功能 - 保存主页访问记录
    (function() {
        function saveMainPage() {
            try {
                var href = window.location.href;
                localStorage.setItem('cx_last_page', href);
                localStorage.setItem('cx_last_page_time', Date.now());
                console.log('[页面记忆] ✓ 保存主页:', href);
            } catch (e) {
                console.error('[页面记忆] 保存失败:', e);
            }
        }
        
        // 页面卸载前保存
        window.addEventListener('beforeunload', saveMainPage);
        
        // 页面隐藏时保存（移动端切换应用）
        document.addEventListener('visibilitychange', function() {

            if (lastPage && lastPageTime) {

    // 注册 Service Worker 并自动更新

                newWorker.addEventListener('statechange', function() {

            return navigator.serviceWorker.ready;

        // 监听 SW 控制器变化（静默刷新）
        var refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', function() {
            if (refreshing) return;

            // 强制 reload 会打断 Capacitor TTS 插件与 Android TTS 服务的连接，导致朗读失败
            var isCapacitorApp = !!(window.Capacitor && window.Capacitor.isNativePlatform &&

    // PWA 安装由 theme-toggle.js 的 initSettingsActions 统一处理
    
    // 生成单个训练的资源列表（提升到全局作用域）
    /**
     * 获取指定训练的资源列表（从自动扫描结果中筛选）
     * @param {string} path - 训练路径，如 '2025-07'
     * @param {Array} images - 训练的图片列表
     * @returns {Array} 资源 URL 列表
     */
    function getTrainingResources(path, images) {
        var allPages = window.__cxTrainingPages || [];
        var prefix = './' + path + '/';
        
        // 筛选出该训练的所有页面（已包含 HTML 和 JS）
        var resources = allPages.filter(function(page) {
            return page.startsWith(prefix);
        });
        
        // 添加图片
        if (images && images.length > 0) {
            images.forEach(function(img) {
                resources.push(prefix + img);
            });
        }
        
        return resources;
    }

    // ── PWA 缓存完整性检查 & 强制安装 ────────────────────────────────────

    // 等待训练列表就绪（最多等 timeout ms）
    function waitForTrainings(timeout) {
        return new Promise(function(resolve, reject) {
            if (window.__cxTrainings && window.__cxTrainings.length > 0) {
                resolve(window.__cxTrainings); return;
            }
            var elapsed = 0;
            var iv = setInterval(function() {
                if (window.__cxTrainings && window.__cxTrainings.length > 0) {
                    clearInterval(iv); resolve(window.__cxTrainings);
                } else {
                    elapsed += 100;
                    if (elapsed >= timeout) { clearInterval(iv); reject(new Error('训练列表加载超时')); }
                }
            }, 100);
        });
    }

    // 验证缓存完整性：所有核心文件均存在于 cx-main，且各训练 cache 桶存在
    function verifyCacheIntegrity(trainings) {
        if (!('caches' in window)) return Promise.resolve({ ok: false, coverage: 0 });
        var coreUrls = window.__cxCoreUrls || [];
        return caches.keys().then(function(keys) {
            var hasCoreCache = keys.some(function(k) { return k === 'cx-main' || k.indexOf('cx-main-') === 0; });
            if (!hasCoreCache) return { ok: false, coverage: 0 };
            // 验证每个核心文件是否真实存在于 cx-main（目录 './' 跳过，不是实际文件）
            var checkUrls = coreUrls.filter(function(u) { return u !== './'; });
            return caches.open('cx-main').then(function(cache) {
                return Promise.all(checkUrls.map(function(u) {
                    return cache.match(u).then(function(r) { return !!r; });
                }));
            }).then(function(results) {
                var hits = results.filter(Boolean).length;
                var coreCoverage = checkUrls.length > 0 ? hits / checkUrls.length : 1;
                if (coreCoverage < 1) return { ok: false, coverage: coreCoverage };
                if (!trainings || !trainings.length) return { ok: true, coverage: 1 };
                var trainingHits = trainings.filter(function(t) {
                    return keys.some(function(k) { return k === 'cx-' + t.path; });
                });
                var trainingCoverage = trainingHits.length / trainings.length;
                return { ok: trainingCoverage >= 1, coverage: trainingCoverage };
            });
        }).catch(function() { return { ok: false, coverage: 0 }; });
    }

    // 强制安装/更新全屏遮罩（不可关闭，必须完成才能使用）
    function showMandatoryInstallDialog(mode, targetVersion) {
        if (document.getElementById('cxInstallMask')) return;
        var icons     = { install: '📦', update: '🔄' };
        var titles    = { install: '首次安装缓存', update: '缓存更新中' };
        var subtitles = {
            install: '首次使用需缓存全部资源，请保持网络连接...',
            update:  '正在重新缓存最新资源，用户数据不受影响...'
        };
        var mask = document.createElement('div');
        mask.id = 'cxInstallMask';
        mask.className = 'cx-install-mask';
        mask.innerHTML = [
            '<div class="cx-install-box">',
            '  <div class="cx-install-icon">' + icons[mode] + '</div>',
            '  <div class="cx-install-title">' + titles[mode] + '</div>',
            '  <div class="cx-install-sub">' + subtitles[mode] + '</div>',
            '  <div class="cx-install-progress"><div class="cx-install-progress-bar" id="cxInstallProgressBar"></div></div>',
            '  <div class="cx-install-status" id="cxInstallStatus">正在准备...</div>',
            '  <button class="cx-install-retry" id="cxInstallRetry">重试</button>',
            '</div>'
        ].join('');
        mask.addEventListener('click', function(e) { e.stopPropagation(); });
        document.body.appendChild(mask);

        var statusEl    = document.getElementById('cxInstallStatus');
        var progressBar = document.getElementById('cxInstallProgressBar');
        var retryBtn    = document.getElementById('cxInstallRetry');

        function doInstall() {
            if (retryBtn) retryBtn.style.display = 'none';
            if (progressBar) progressBar.style.width = '0%';
            if (statusEl) statusEl.textContent = '正在清理旧缓存...';
            // 先清除所有旧缓存，确保重新下载最新资源
            var clearStep = ('caches' in window)
                ? caches.keys().then(function(keys) {
                    return Promise.all(
                        keys.filter(function(k) { return k.indexOf('cx-') === 0; })
                            .map(function(k) { return caches.delete(k); })
                    );
                }).catch(function() {})
                : Promise.resolve();
            clearStep.then(function() {
            if (statusEl) statusEl.textContent = '正在等待训练列表...';
            waitForTrainings(15000).then(function(trainings) {
                if (statusEl) statusEl.textContent = '开始缓存资源...';
                return cacheAllTrainings(statusEl, function(percent) {
                    if (progressBar) progressBar.style.width = Math.min(percent, 100) + '%';
                }).then(function() {
                    if (progressBar) progressBar.style.width = '100%';
                    if (statusEl) statusEl.textContent = '✓ 下载完成，正在验证...';
                    return verifyCacheIntegrity(trainings);
                }).then(function(result) {
                    if (result.ok) {
                        try { localStorage.setItem('cx_pwa_version', targetVersion); } catch(e) {}
                        // 安装/修复完成，清除旧版本错误日志
                        if (window.CX && window.CX.errorLog) window.CX.errorLog.clear();
                        if (statusEl) statusEl.textContent = '✅ 缓存完整，即将进入...';
                        setTimeout(function() {
                            var m = document.getElementById('cxInstallMask');
                            if (m && m.parentNode) m.parentNode.removeChild(m);
                        }, 800);
                    } else {
                        if (statusEl) statusEl.textContent = '⚠ 部分资源未完整（' + Math.round((result.coverage || 0) * 100) + '%），请重试';
                        if (retryBtn) retryBtn.style.display = 'block';
                    }
                });
            }).catch(function(err) {
                if (statusEl) statusEl.textContent = '⚠ 出错：' + (err && err.message || '未知') + '，请重试';
                if (retryBtn) retryBtn.style.display = 'block';
            });
            }); // clearStep end
        }
        if (retryBtn) retryBtn.addEventListener('click', doInstall);
        doInstall();
    }

    // PWA 启动时检查缓存版本与完整性
    function checkPwaStartupCache() {
        var isStandalone = window.navigator.standalone === true ||
                           window.matchMedia('(display-mode: standalone)').matches;
        var isCapacitor  = !!(window.Capacitor && window.Capacitor.isNativePlatform &&
                              window.Capacitor.isNativePlatform());
        if (!isStandalone || isCapacitor || !('caches' in window)) return;
        var storedVersion = null;
        try { storedVersion = localStorage.getItem('cx_pwa_version'); } catch(e) {}
        fetch('./version.json?t=' + Date.now(), { cache: 'no-store' })
            .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
            .then(function(v) {
                var remoteVersion = v.version || v.apk_version;
                var targetVersion = remoteVersion || storedVersion;
                var versionChanged = remoteVersion && storedVersion !== remoteVersion;
                if (versionChanged) {
                    console.log('[PWA] 版本更新: 本地=' + storedVersion + ' 远程=' + remoteVersion + '，强制重新缓存');
                    showMandatoryInstallDialog('update', targetVersion);
                    return;
                }
                // 版本一致时，再检查缓存完整性
                waitForTrainings(5000).then(function(trainings) {
                    return verifyCacheIntegrity(trainings);
                }).then(function(result) {
                    if (!result.ok) {
                        var mode = storedVersion ? 'update' : 'install';
                        console.log('[PWA] 缓存不完整（' + Math.round((result.coverage || 0) * 100) + '%），触发' + mode);
                        showMandatoryInstallDialog(mode, targetVersion);
                    }
                    // 缓存完整且版本一致：正常使用
                }).catch(function() {});
            })
            .catch(function(err) {
                console.log('[PWA] version.json 获取失败:', err.message);
                // 离线且从未缓存：显示非阻塞提示横幅，不阻塞 UI
                if (!storedVersion) {
                    var banner = document.getElementById('cxOfflineBanner');
                    if (banner) {
                        banner.classList.add('show');
                        var dismissBtn = banner.querySelector('.cx-banner-dismiss');
                        if (dismissBtn) dismissBtn.addEventListener('click', function() {
                            banner.classList.remove('show');
                        });
                    }
                }
                // 已有版本记录但离线：静默使用现有缓存
            });
    }

    // 缓存所有训练资源
    function cacheAllTrainings(statusEl, onProgress) {
        if (!('caches' in window)) {
            if (statusEl) {
                statusEl.textContent = '当前环境不支持缓存';
                statusEl.className = 'cache-status error';
            }
            return Promise.resolve();
        }

        var trainings = window.__cxTrainings || [];
        if (!trainings.length) {
            if (statusEl) {
                statusEl.textContent = '训练列表尚未加载';
                statusEl.className = 'cache-status error';
            }
            return Promise.resolve();
        }

        // 统计总资源数（核心 + 各训练）
        var coreUrls = window.__cxCoreUrls || [];
        var totalTrainings = trainings.length;
        var currentIndex = 0;
        var totalResources = coreUrls.length;
        var cachedResources = 0;

        trainings.forEach(function(training) {
            totalResources += getTrainingResources(training.path, training.images || []).length;
        });

        function reportProgress() {
            var percent = totalResources > 0 ? Math.round((cachedResources / totalResources) * 100) : 0;
            if (onProgress) onProgress(percent);
            return percent;
        }

        // 第一阶段：缓存核心共享资源到 cx-main（由 Python 扫描生成 __cxCoreUrls）
        if (statusEl) {
            statusEl.textContent = '缓存核心资源（0/' + coreUrls.length + '）...';
            statusEl.className = 'cache-status';
        }
        var cacheShared = caches.open('cx-main').then(function(cache) {
            return Promise.allSettled(coreUrls.map(function(url) {
                return fetch(url, { cache: 'no-cache' })
                    .then(function(r) {
                        cachedResources++;
                        if (statusEl) statusEl.textContent = '核心资源：' + cachedResources + '/' + coreUrls.length + '（' + reportProgress() + '%）';
                        // 用 r.clone() 存缓存：避免与 SW 侧共享同一 body stream 造成写入空体
                        if (r.ok) return cache.put(url, r.clone());
                    })
                    .catch(function() { cachedResources++; reportProgress(); });
            }));
        }).catch(function() {});

        // 第二阶段：逐训练缓存
        return cacheShared.then(function() {
            if (statusEl) {
                statusEl.textContent = '开始缓存训练内容...';
                statusEl.className = 'cache-status';
            }
            return trainings.reduce(function(promise, training) {
            return promise.then(function() {
                currentIndex++;
                var resources = getTrainingResources(training.path, training.images || []);
                var cacheKey = 'cx-' + training.path;

                if (statusEl) {
                    statusEl.textContent = '缓存中：' + training.title + '（' + currentIndex + '/' + totalTrainings + '）';
                    statusEl.className = 'cache-status';
                }

                return caches.open(cacheKey).then(function(cache) {
                    var tasks = resources.map(function(url) {
                        return fetch(url, { redirect: 'follow', cache: 'no-cache' })
                            .then(function(response) {
                                if (response.ok && response.status >= 200 && response.status < 300) {
                                    cachedResources++;
                                    var percent = reportProgress();
                                    if (statusEl) statusEl.textContent = '缓存进度：' + percent + '%（' + training.title + ')';
                                    return cache.put(response.url, response.clone());
                                }
                            })
                            .catch(function() {
                                cachedResources++;
                                reportProgress();
                            });
                    });
                    return Promise.all(tasks);
                });
            });
        }, Promise.resolve());
        }).then(function() {
            if (statusEl) {
                statusEl.textContent = '✓ 全部缓存完成';
                statusEl.className = 'cache-status success';
            }
        }).then(function() {
            try {
                localStorage.setItem('cx_all_cached', Date.now().toString());
            } catch (e) {}
            updateCacheAllButtonState();
        }).catch(function(err) {
            console.error('缓存所有训练失败:', err);
            if (statusEl) {
                statusEl.textContent = '⚠ 缓存中断，请重试';
                statusEl.className = 'cache-status warning';
            }
        });
    }

    function updateCacheAllButtonState() {
        var cacheAllBtn = document.getElementById('cacheAllBtn');
        var dataToolsStatus = document.getElementById('actionStatus');
        if (!cacheAllBtn) return;

        var flag = null;
        try {
            flag = localStorage.getItem('cx_all_cached');
        } catch (e) {}

        if (!flag) {
            cacheAllBtn.querySelector('.cache-icon').textContent = '📦';
            cacheAllBtn.querySelector('.cache-text').textContent = '缓存数据';
            return;
        }

        if ('caches' in window) {
            caches.keys().then(function(keys) {
                var hasTrainingCache = keys.some(function(key) { return key.indexOf('cx-') === 0; });
                if (hasTrainingCache) {
                    cacheAllBtn.querySelector('.cache-icon').textContent = '✅';
                    cacheAllBtn.querySelector('.cache-text').textContent = '已缓存';
                    if (dataToolsStatus && !dataToolsStatus.textContent) {
                        dataToolsStatus.textContent = '✓ 已缓存全部数据';
                        dataToolsStatus.className = 'cache-status success';
                    }
                } else {
                    try { localStorage.removeItem('cx_all_cached'); } catch (e) {}
                    cacheAllBtn.querySelector('.cache-icon').textContent = '📦';
                    cacheAllBtn.querySelector('.cache-text').textContent = '缓存数据';
                }
            }).catch(function() {
                cacheAllBtn.querySelector('.cache-icon').textContent = '📦';
                cacheAllBtn.querySelector('.cache-text').textContent = '缓存数据';
            });
        }
    }

                }, 2000); // 长按2秒触发
            });
            
            // 触摸结束
            logo.addEventListener('touchend', function(e) {
                if (longPressTimer) {
                    clearTimeout(longPressTimer);
                }
                // 如果是长按，阻止点击事件
                if (isLongPress) {
                    e.preventDefault();
                    e.stopPropagation();
                }
            });
            
            // 触摸移动（取消长按）
            logo.addEventListener('touchmove', function(e) {
                if (longPressTimer) {
                    clearTimeout(longPressTimer);
                }
                isLongPress = false;
            });
            
            // 桌面端：鼠标长按
            logo.addEventListener('mousedown', function(e) {
                isLongPress = false;
                longPressTimer = setTimeout(function() {
                    isLongPress = true;
                    promptClearData();
                }, 2000);
            });
            
            logo.addEventListener('mouseup', function(e) {
                if (longPressTimer) {
                    clearTimeout(longPressTimer);
                }
                if (isLongPress) {
                    e.preventDefault();
                    e.stopPropagation();
                }
            });
            
            logo.addEventListener('mouseleave', function(e) {
                if (longPressTimer) {
                    clearTimeout(longPressTimer);
                }
                isLongPress = false;
            });
        }

        function promptClearData() {
            window.CX.showClearDialog(function(selected) {
                clearAllCachesAndMemory({ keepNotes: true, clearNotesOnly: (selected === 'notes') });
            });
        }

        // 注册主页清理函数（含保留笔记选项）供 theme-toggle.js 调用
        window.CX.clearData = promptClearData;

        updateCacheAllButtonState();
        
        // 清理所有缓存和记忆的函数
        function clearAllCachesAndMemory(options) {
            options = options || {};
            var keepNotes = options.keepNotes === true;
            var clearNotesOnly = options.clearNotesOnly === true;
            console.log('[清理] 开始清理', clearNotesOnly ? '仅笔记' : '常规数据');

            var actionStatus = document.getElementById('actionStatus');
            if (actionStatus) {
                actionStatus.textContent = '🧹 正在清理中，请稍候...';
                actionStatus.className = 'cache-status';
            }

            // 仅清除笔记
            if (clearNotesOnly) {
                try { localStorage.removeItem('cx_highlights'); } catch(e) {}
                try { localStorage.removeItem('cx_highlights_bak'); } catch(e) {}
                try { localStorage.removeItem('cx_highlights_bak_ts'); } catch(e) {}
                if (actionStatus) { actionStatus.textContent = '✓ 划线笔记已清除，即将刷新...'; actionStatus.className = 'cache-status success'; }
                window.location.reload(true);
                return;
            }
            
            var cleanupSteps = [];
            
            // 1. 清理 localStorage（页面记忆、字体设置、语速设置等）
            cleanupSteps.push(new Promise(function(resolve) {
                try {
                    var keysToRemove = [];
                    for (var i = 0; i < localStorage.length; i++) {
                        var key = localStorage.key(i);
                        // 清理所有 cx_ 开头的键（保留首次使用时间，用于赞助按钮显示判断）
                        if (key && key.startsWith('cx_')) {
                            if (key === 'cx_first_use') continue;  // 不清除赞助显示时间设定
                            if (keepNotes && key === 'cx_highlights') {
                                continue;
                            }
                            keysToRemove.push(key);
                        }
                        // 清理字体、主题和语速设置
                        if (key === 'fontSize' || key === 'globalFontSize' || key === 'readingTheme' || key === 'speechRate') {
                            keysToRemove.push(key);
                        }
                    }
                    keysToRemove.forEach(function(key) {
                        localStorage.removeItem(key);
                        console.log('[清理] 删除 localStorage:', key);
                    });
                    console.log('[清理] localStorage 清理完成，共删除', keysToRemove.length, '项');
                    resolve();
                } catch (e) {
                    console.error('[清理] 清理 localStorage 失败:', e);
                    resolve(); // 继续执行其他清理
                }
            }));
            
            // 2. 清理 sessionStorage
            cleanupSteps.push(new Promise(function(resolve) {
                try {
                    sessionStorage.clear();
                    console.log('[清理] sessionStorage 已清理');
                    resolve();
                } catch (e) {
                    console.error('[清理] 清理 sessionStorage 失败:', e);
                    resolve();
                }
            }));
            
            // 3. 注销所有 Service Worker
            if ('serviceWorker' in navigator) {
                cleanupSteps.push(
                    navigator.serviceWorker.getRegistrations().then(function(registrations) {
                        console.log('[清理] 找到 Service Worker:', registrations.length, '个');
                        return Promise.all(
                            registrations.map(function(registration) {
                                console.log('[清理] 注销 Service Worker:', registration.scope);
                                return registration.unregister();
                            })
                        );
                    }).catch(function(e) {
                        console.error('[清理] 注销 Service Worker 失败:', e);
                    })
                );
            }
            
            // 4. 清理所有 Cache Storage
            if ('caches' in window) {
                cleanupSteps.push(
                    caches.keys().then(function(keys) {
                        console.log('[清理] 找到缓存:', keys.length, '个');
                        return Promise.all(
                            keys.map(function(key) {
                                console.log('[清理] 删除缓存:', key);
                                return caches.delete(key);
                            })
                        );
                    }).catch(function(e) {
                        console.error('[清理] 清理 Cache Storage 失败:', e);
                    })
                );
            }
            
            // 5. 清理 IndexedDB
            if ('indexedDB' in window) {
                cleanupSteps.push(new Promise(function(resolve) {
                    try {
                        // 尝试删除常见的 IndexedDB 数据库
                        var dbNames = ['cx-trainings', 'cx-cache', 'workbox-expiration'];
                        var deletePromises = dbNames.map(function(dbName) {
                            return new Promise(function(resolveDB) {
                                var request = indexedDB.deleteDatabase(dbName);
                                request.onsuccess = function() {
                                    console.log('[清理] 删除 IndexedDB:', dbName);
                                    resolveDB();
                                };
                                request.onerror = function() {
                                    console.log('[清理] IndexedDB 不存在或删除失败:', dbName);
                                    resolveDB();
                                };
                                request.onblocked = function() {
                                    console.log('[清理] IndexedDB 删除被阻止:', dbName);
                                    resolveDB();
                                };
                            });
                        });
                        Promise.all(deletePromises).then(resolve);
                    } catch (e) {
                        console.error('[清理] 清理 IndexedDB 失败:', e);
                        resolve();
                    }
                }));
            }
            
            // 执行所有清理步骤
            Promise.all(cleanupSteps).then(function() {
                console.log('[清理] 所有缓存和记忆已清理完成');
                
                if (actionStatus) {
                    actionStatus.textContent = '✅ 清理完成！页面即将刷新...';
                    actionStatus.className = 'cache-status success';
                }
                
                // 立即刷新页面
                setTimeout(function() {
                    window.location.reload(true);
                }, 0);
            }).catch(function(err) {
                console.error('[清理] 清理过程出错:', err);
                if (actionStatus) {
                    actionStatus.textContent = '⚠ 部分清理完成，页面即将刷新';
                    actionStatus.className = 'cache-status warning';
                }
                // 即使出错也刷新页面
                setTimeout(function() {
                    window.location.reload(true);
                }, 0);
            });
        }
    });
    </script>
</body>
</html>
