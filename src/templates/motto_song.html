{% extends "base.html" %}

{% block title %}标语诗歌 - {{ training.title }}{% endblock %}

{% block head_css %}{% endblock %}

{% block content %}
<div class="song-page">
    <!-- 标语诗歌页导航栏 -->
    <div class="page-navigation">
        <a href="../index.html" class="nav-link" title="返回主页" onclick="try{sessionStorage.setItem('cx_user_back','true')}catch(e){}">返回主页</a>
        <a href="index.html" class="nav-link" title="目录">目录</a>
        {% if training.mottos %}
        <a href="motto.htm" class="nav-link" title="标语">标语</a>
        {% endif %}
        <a href="motto_song.htm" class="nav-link active" title="标语诗歌">标语诗歌</a>
    </div>
    
    <div class="song-container">
        <div class="song-image-wrapper">
            <img src="{{ training.motto_song_image }}" alt="标语诗歌" class="song-image" onclick="openImageViewer(this.src)">
            <p class="click-hint">👆 点击图片放大查看</p>
        </div>
    </div>
</div>


{% block nav_init %}
<script>
// 标语诗歌页覆盖 base.html 的默认导航
if (window.CXNavStack) {
    window.CXNavStack.initMottoSongPage();
}
</script>
{% endblock %}

{% endblock %}

{% block extra_scripts %}{% endblock %}
